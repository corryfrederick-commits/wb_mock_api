    post:
      x-readonly-method: true
      x-category: marketplace
      tags:
        - In-Store Pickup Assembly Orders
      summary: Get Assembly Order Statuses
      description: |
        The method provides the statuses of [assembly orders](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders) by their ID.
        <br><br>
        `supplierStatus` — the status of the assembly order. The trigger for its change is the action of the seller himself.

        Possible values for `supplierStatus`:
        | Status              | Description                | How to set the assembly order to this status                    |
        |---------------------|----------------------------|-----------------------------------------------------------------|
        | `new`                 | **New assembly order**         ||
        | `confirm`             | **In assembly**                | [Transfer to assembly](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1confirm/post)          |
        | `prepare`             | **Ready for pickup**           | [Notify that the assembly order is ready for delivery](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1prepare/post)           |
        | `receive`             | **Received by buyer**       | [Notify that the order has been received by the buyer](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1receive/post)           |
        | `reject`              | **Buyer refusal**           | [Notify that the buyer has declined the order](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1reject/post)            |
        | `cancel`              | **Canceled by seller**         | [Cancel the order](/openapi/in-store-pickup#tag/In-Store-Pickup-Assembly-Orders/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1cancel/post)            |
        | `cancel_shelf_life`   | **Canceled due to shelf life expiration** | Automatically transitions upon event occurrence |

        `wbStatus` — the status of the assembly order in the WB system.

        Possible values for wbStatus:
        - `waiting` - assembly order is in progress
        - `sorted` - assembly order is sorted
        - `sold` - the buyer got the order
        - `canceled` - assembly order canceled
        - `canceled_by_client` - buyer canceled the order upon receipt
        - `declined_by_client` - buyer canceled the order within the first hour
        <br>Cancellation is available to the buyer within the first hour from the time of order, if the order has not been transitioned to assembly
        - `defect` - order canceled due to defect
        - `ready_for_pickup` - order is ready for pickup

