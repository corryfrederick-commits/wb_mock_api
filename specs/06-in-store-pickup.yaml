    api.OrdersMetaDetailsResponse:
      type: object
      required:
        - requestId
        - orders
      properties:
        requestId:
          type: string
          description: Unique request ID
          example: f1787bd2d1fdс35d6f537316514у4a05
        orders:
          type: array
          description: Assembly orders label identifiers and validation statuses
          items:
            type: object
            required:
              - isError
              - metaDetails
              - orderId
            properties:
              orderId:
                type: integer
                example: 123456
                description: Assembly order ID
              isError:
                type: boolean
                description: Are there any errors
                example: false
              errors:
                type: array
                example: []
                description: Error data
                items:
                  type: object
                  required:
                    - code
                    - detail
                  properties:
                    code:
                      type: integer
                      description: Error code
                      example: 404
                    detail:
                      type: string
                      example: NotFound
                      description: Additional error data
              metaDetails:
                type: array
                description: Label identifiers and their validation statuses
                items:
                  type: object
                  required:
                    - decision
                    - key
                  properties:
                    key:
                      type: string
                      example: imei
                      description: Label identifier
                    value:
                      type: string
                      nullable: true
                      description: Label identifier value
                      example: '359876543210025'
                    decision:
                      type: string
                      example: imeiInvalidFormat
                      description: |
                        Label identifiers validation statuses. <br>
                        - `imei`
                          - `filled` — Label identifier is added to the assembly order, validation is not required
                          - `deadlineExceeded` — Label identifier validation is not completed and will continue. The validation can pass or fail
                          - `optional` — Label identifier is not required. Validation passed
                          - `imeiMaySell` — The item is approved for sale. Validation passed
                          - `imeiSoldB2B` — The item was sold to a B2B buyer and approved for sale again. Validation passed
                          - `pending` — Label identifier validation continues. Wait for the validation status to change
                          - `required` — Required label identifier is not added to the assembly order. Validation failed
                          - `imeiInvalidFormat` — Invalid format. Validation failed
                          - `imeiAlreadySold` — The item with this IMEI has already been sold. Validation failed
                        - `uin`
                          - `filled` — Label identifier is added to the assembly order, validation is not required
                          - `optional` — Label identifier is not required. Validation passed
                          - `required` — Required label identifier is not added to the assembly order. Validation failed
                        - `sgtin`
                          - `filled` — Label identifier is added to the assembly order, validation is not required
                          - `deadlineExceeded` —  Label identifier validation is not completed and will continue. The validation can pass or fail
                          - `optional` — Label identifier is not required. Validation passed
                          - `sgtinIntroduced` — The item is approved for sale. Validation passed
                          - `sgtinSoldB2B` — The item was sold to a B2B buyer and approved for sale again. Validation passed
                          - `pending` — Label identifier validation continues. Wait for the validation status to change
                          - `required` — Required label identifier is not added to the assembly order. Validation failed
                          - `sgtinInvalidFormat` — Invalid format. Validation failed
                          - `sgtinNotFound` — Label identifier not found in [Chestny ZNAK](https://chestnyznak.ru/en/). Validation failed
                          - `sgtinEmitted` —  Label identifier has been issued. Validation failed
                          - `sgtinApplied` — Putting into circulation not completed. Validation failed
                          - `sgtinWrittenOff` — Written off. Validation failed
                          - `sgtinRetired` — Retired. Validation failed
                          - `sgtinWithdrawn` — Withdrawn. Validation failed
                          - `sgtinDisaggregated` — Disaggregated. Validation failed
                          - `sgtinDisaggregation` — Disaggregation. Validation failed
                          - `sgtinAppliedNotPaid` — Not paid. Validation failed
                        - `gtin`
                          - `filled` — Label identifier is added to the assembly order, validation is not required
                          - `optional` — Label identifier is not required. Validation passed
                          - `required` — Required label identifier is not added to the assembly order. Validation failed
                        - `customsDeclaration`
                          - `filled` — Label identifier is added to the assembly order, validation is not required
                          - `optional` — Label identifier is not required. Validation passed
                          - `required` — Required label identifier is not added to the assembly order. Validation failed
