                - `sgtinApplied` — Putting into circulation not completed
                - `sgtinWrittenOff` — Written off
                - `sgtinRetired` — Retired
                - `sgtinWithdrawn` — Withdrawn
                - `sgtinDisaggregated` — Disaggregated
                - `sgtinDisaggregation` — Disaggregation
                - `sgtinAppliedNotPaid` — Not paid
              - `gtin`
                - `required` — Required label identifier is not added to the assembly order
              - `expiration`
                - `required` — Required label identifier is not added to the assembly order
              - `customsDeclaration`
                - `required` — Required label identifier is not added to the assembly order
