components:
  schemas:
    MainRequest:
      type: object
      description: |
        Request parameters for forming the main page:
          - `currentPeriod` — current period
          - `pastPeriod` — past period for comparison
      properties:
        currentPeriod:
          $ref: '#/components/schemas/Period'
        pastPeriod:
          $ref: '#/components/schemas/pastPeriod'
        nmIds:
          type: array
          example:
            - 162579635
            - 166699779
          description: List of WB item numbers for filtering
          items:
            type: integer
            format: int32
        subjectIds:
          type: array
          example:
            - 32
            - 64
          description: List of subcategory IDs for filtering
          items:
            type: integer
            format: int32
        brandNames:
          example:
            - Adidas
            - Nike
          type: array
          description: List of brands for filtering
          items:
            type: string
        tagIds:
          example:
            - 3
            - 5
            - 6
          description: List of label IDs for filtering
          type: array
          items:
            type: integer
            format: int64
        positionCluster:
          $ref: '#/components/schemas/PositionCluster'
        orderBy:
          $ref: '#/components/schemas/OrderByMainAndDetails'
        includeSubstitutedSKUs:
          type: boolean
          default: true
          example: true
          description: Show data for direct queries with [promo items](https://seller.wildberries.ru/help-center/article/A-524)
        includeSearchTexts:
          type: boolean
          default: true
          example: false
          description: Show data for search queries without promo items
        limit:
          example: 130
          type: integer
          description: Number of item groups in the response
          format: uint32
          maximum: 1000
        offset:
          example: 50
          type: integer
          description: From which element to start outputting data
          format: uint32
      required:
        - currentPeriod
        - orderBy
        - positionCluster
        - limit
        - offset
    MainResponse:
      type: object
      properties:
        commonInfo:
          $ref: '#/components/schemas/CommonInfo'
        positionInfo:
          $ref: '#/components/schemas/PositionInfo'
        visibilityInfo:
          $ref: '#/components/schemas/VisibilityInfo'
        groups:
          description: |
            Table elements list
          type: array
          items:
            $ref: '#/components/schemas/TableGroupItem'
        currency:
          $ref: '#/components/schemas/Currency'
      required:
        - commonInfo
        - positionInfo
        - visibilityInfo
        - currency
    CommonInfo:
      type: object
      description: Common information
      properties:
        supplierRating:
          description: Seller rating
          type: object
          properties:
            current:
              type: number
              format: float64
              example: 5.3
              description: Current seller rating
            dynamics:
              type: number
              format: float64
              example: 5.4
              description: Dynamics compared to the previous period (%)
          required:
            - current
        advertisedProducts:
          description: Number of advertised items
          type: object
          properties:
            current:
              example: 5
              description: Current number of advertised items
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        totalProducts:
          example: 150
          description: Total number of items
          type: integer
          format: uint64
      required:
        - supplierRating
        - advertisedProducts
        - totalProducts
    PositionInfo:
      type: object
      description: Item position information
      properties:
        average:
          description: Average item position in search results
          type: object
          properties:
            current:
              example: 5
              description: Current average item position
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        median:
          description: Median item position in search results
          type: object
          properties:
            current:
              example: 5
              description: Current median item position
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        chartItems:
          type: array
          description: Data for the chart on the average and median position of the item in search results
          items:
            $ref: '#/components/schemas/SearchReportPositionChartItem'
        clusters:
          $ref: '#/components/schemas/SearchReportPositionClusters'
      required:
        - average
        - median
        - chartItems
        - clusters
    SearchReportPositionChartItem:
      type: object
      properties:
        dt:
          example: '2024-10-19'
          type: string
          description: Data
        average:
          example: 1
          type: integer
          description: Average item position in search results
          format: uint64
        median:
          example: 1
          type: integer
          description: Median item position in search results
          format: uint64
      required:
        - dt
        - average
        - median
    SearchReportPositionClusters:
      type: object
      description: |
        Number of items with an average search position:
          - `firstHundred` — from 1 to 100
          - `secondHundred` — from 101 to 200
          - `below` — from 201 and below
      properties:
        firstHundred:
          description: from 1 to 100
          type: object
          properties:
            current:
              example: 5
              description: Current number of items
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        secondHundred:
          description: from 101 to 200
          type: object
          properties:
            current:
              example: 5
              description: Current number of items
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        below:
          description: from 201 and below
          type: object
          properties:
            current:
              example: 5
              description: Current number of items
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
      required:
        - firstHundred
        - secondHundred
        - below
    VisibilityInfo:
      type: object
      description: Visibility of listings and transitions to listings. By days, weeks, months
      properties:
        visibility:
          description: Probability percentage that a user will see the listing. Depends on the average position
          type: object
          properties:
            current:
              example: 5
              description: Visibility in search results in the current period
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        openCard:
          description: Click-throughs from search
          type: object
          properties:
            current:
              example: 5
              description: Current click-throughs
              type: integer
            dynamics:
              example: 50
              description: Dynamics compared to the previous period (%)
              type: integer
          required:
            - current
        byDay:
          type: array
          description: Data for plotting a chart in the personal account on visibility and transitions to listings by day
          items:
            type: object
            properties:
              dt:
                $ref: '#/components/schemas/Date'
              visibility:
                example: 100
                description: Listing visibility in search results, %
                type: integer
                format: uint64
              open:
                example: 124
                description: Number of transitions to the listing
                type: integer
                format: uint64
            required:
              - dt
              - visibility
              - open
        byWeek:
          type: array
          description: Data for plotting a chart in the personal account on visibility and transitions to listings by week
          items:
            type: object
            properties:
              dt:
                $ref: '#/components/schemas/Date'
              visibility:
                example: 100
                description: Listing visibility in search results, %
                type: integer
                format: uint64
              open:
                example: 124
                description: Number of transitions to the listing
                type: integer
                format: uint64
            required:
              - dt
              - visibility
              - open
        byMonth:
          type: array
          description: Data for plotting a chart in the personal account on visibility and transitions to listings by month
          items:
            type: object
            properties:
              dt:
                $ref: '#/components/schemas/Date'
              visibility:
                example: 100
                description: Listing visibility in search results, %
                type: integer
                format: uint64
              open:
                example: 124
                description: Number of transitions to the listing
                type: integer
                format: uint64
            required:
              - dt
              - visibility
              - open
      required:
        - visibility
        - openCard
    TableGroupItem:
      type: object
      description: |
        A group of items includes all listings that match at least one of the following parameters:
          - `subjectName` — name of the subcategory
          - `brandName` — name of the brand
          - `tagName` — name of the label
      properties:
        subjectName:
          example: Phones
          description: Subcategory name
          type: string
        subjectId:
          example: 50
          description: Subcategory ID
          type: integer
          format: uint64
        brandName:
          example: Apple
          description: Brand
          type: string
        tagName:
          example: phones
          description: Label name
          type: string
        tagId:
          example: 65
          description: Label ID
          type: integer
          format: int64
        metrics:
          type: object
          description: Item metrics in the table
          properties:
            avgPosition:
              description: Average item position in search results
              type: object
              properties:
                current:
                  example: 5
                  description: Current average position
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            openCard:
              description: Click-throughs from search
              type: object
              properties:
                current:
                  example: 5
                  description: Current click-throughs
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            addToCart:
              description: Adds-to-Cart from search
              type: object
              properties:
                current:
                  example: 5
                  description: Current number
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            openToCart:
              description: Conversion to cart from search — the ratio of item additions to the cart compared to all transitions to the listing from the search
              type: object
              properties:
                current:
                  example: 5
                  description: Current conversion
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            orders:
              description: Items ordered from search
              type: object
              properties:
                current:
                  example: 5
                  description: Current number
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            cartToOrder:
              description: Conversion to order from search — the ratio of items ordered to all additions of the item from search to the cart
              type: object
              properties:
                current:
                  example: 5
                  description: Current conversion
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            visibility:
              description: Item visibility percent in search results
              type: object
              properties:
                current:
                  example: 5
                  description: Current visibility percent
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
          required:
            - avgPosition
            - openCard
            - addToCart
            - openToCart
            - orders
            - cartToOrder
            - visibility
        items:
          type: array
          description: List of the group items
          items:
            $ref: '#/components/schemas/TableItemItem'
      required:
        - metrics
        - items
    TableItemItem:
      type: object
      allOf:
        - type: object
          properties:
            nmId:
              example: 268913787
              description: WB item number
              type: integer
              format: int64
            name:
              example: iPhone 13 256 ГБ Серебристый
              description: Item name
              type: string
            vendorCode:
              example: wb3ha2668w
              description: Seller item number
              type: string
            subjectName:
              example: Смартфоны
              description: Subcategory name
              type: string
            brandName:
              example: Apple
              description: Brand
              type: string
            mainPhoto:
              example: https://basket-12.wbbasket.ru/vol1788/part178840/178840836/images/c246x328/1.webp
              description: URL of the main photo of the listing
              type: string
            isAdvertised:
