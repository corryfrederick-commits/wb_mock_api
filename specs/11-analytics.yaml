openapi: 3.0.1
info:
  title: Analytics and Data
  version: analytics
  description: |
    <div class="api-block">

    Data on seller analytics.

    </div>
  x-file-name: analytics
security:
  - HeaderApiKey: []
tags:
  - name: Sales Funnel
    description: ''
  - name: Search Queries for Your Items
    description: ''
  - name: Stocks Report
    description: ''
  - name: Item Rating
    description: ''
  - name: Seller Analytics CSV
    description: ''
paths:
  /api/analytics/v3/sales-funnel/products:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Sales Funnel
      summary: Listings Statistics per Period
      operationId: postSalesFunnelProducts
      description: |
        The method generates a report on items by comparing key metrics for the current period with a similar past one.<br><br>

        The report data is updated once an hour.<br><br>

        Most of the data appears within an hour of the event:
          - orders
          - click-throughs
          - adds-to-Cart

        A small part of this data may appear within a few days.<br><br>

        Purchases, cancellations, and returns are displayed in report for the day an item was ordered. For example, if an order was placed on January 1, and the customer returned the item on January 10, data about this return will appear in the report for January 1.<br>
        You can track the final sales results using [details for the realization reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports).<br><br>

        The `brandNames`, `subjectIds`, `tagIds`, and `nmIds` parameters can be empty `[]`, in which case the response will return all of the seller listings.<br><br>

        If you specify multiple parameters, the response will include listings that match all of these parameters simultaneously. If no listings match the request parameters, an empty response `[]` will be returned.<br><br>

        You can get a report for a maximum of the last 365 days.<br><br>

        In the previous period's data:
        * The data in `pastPeriod` covers the same duration as in `selectedPeriod`
        * If the `pastPeriod` start date is more than a year before the current date, it will be adjusted to: `pastPeriod.start = current date - 365 days`

        Pagination can be used.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemsRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    allOf:
                      - type: object
                        description: Statistics
                      - $ref: '#/components/schemas/ItemsResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/AuthorizationErrorResponse'
        '429':
          $ref: '#/components/responses/429'
  /api/analytics/v3/sales-funnel/products/history:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Sales Funnel
      summary: Listings Statistics per Days
      operationId: postSalesFunnelProductsHistory
      description: |
        The method returns statistics for listings by day or by week.<br>
        You can get data for a maximum of the last week.<br><br>

        The report data is updated once an hour.<br><br>

        Most of the data appears within an hour of the event:
          - orders
          - click-throughs
          - adds-to-Cart

        A small part of this data may appear within a few days.<br><br>

        Purchases, cancellations, and returns are displayed in report for the day an item was ordered. For example, if an order was placed on January 1, and the customer returned the item on January 10, data about this return will appear in the report for January 1.<br>
        You can track the final sales results using [details for the realization reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports).

        <div class="description_important">
          To get reports for a period of up to a year, use the <a href="/openapi/analytics#tag/Seller-Analytics-CSV">Seller Analytics CSV</a> methods — the <code>DETAIL_HISTORY_REPORT</code> type. Reports of this type are available only with <a href='https://seller.wildberries.ru/monetization/jam'>Jam</a> subscription
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemHistoryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/AuthorizationErrorResponse'
        '429':
          $ref: '#/components/responses/429'
  /api/analytics/v3/sales-funnel/grouped/history:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Sales Funnel
      summary: Grouped Listings Statistics per Days
      operationId: postSalesFunnelGroupedHistory
      description: |
        The method returns statistics for listings by day or by week.<br>
        Listings are grouped by subcategories, brands and labels.<br>
        You can get data for a maximum of the last week.<br><br>

        The report data is updated once an hour.<br><br>
        Most of the data appears within an hour of the event:
          - orders
          - click-throughs
          - adds-to-Cart

        A small part of this data may appear within a few days.<br><br>

        Purchases, cancellations, and returns are displayed in report for the day an item was ordered. For example, if an order was placed on January 1, and the customer returned the item on January 10, data about this return will appear in the report for January 1.<br>
        You can track the final sales results using [details for the realization reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports).<br><br>

        The `brandNames`, `subjectIDs`, `tagIds`, and `nmIds` parameters can be empty `[]`, in which case the response will return all of the seller listings.<br><br>

        The item of the number of subcategories, brands, and labels in the request cannot be more than 16. For example, 4 brands and 4 subcategories or 2 subcategories, 2 labels, and 4 brands.

        <div class="description_important">
          To get reports for a period of up to a year, use the <a href="/openapi/analytics#tag/Seller-Analytics-CSV">Seller Analytics CSV</a> methods — the <code>GROUPED_HISTORY_REPORT</code> type. Reports of this type are available only with <a href='https://seller.wildberries.ru/monetization/jam'>Jam</a> subscription
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupedHistoryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/GroupedHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/AuthorizationErrorResponse'
        '429':
          $ref: '#/components/responses/429'
  /api/v2/nm-report/downloads:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Seller Analytics CSV
      security:
        - HeaderApiKey: []
      summary: Create the Report
      description: |
        The method creates a task for generating a report with advanced seller analytics.
        <br><br>
        You can create a CSV-version of [sales funnel](/openapi/analytics#tag/Sales-Funnel) or [search parameters](/openapi/analytics#tag/Search-Queries-for-Your-Items) report with grouping:

          * by WB item numbers
          * by categories, brands, and labels

        In each of reports on sales funnel, you can group data by days, weeks, or months.
        <br><br>
        Also you can create a CSV-version of [search texts](/openapi/analytics#tag/Search-Queries-for-Your-Items/paths/~1api~1v2~1search-report~1product~1search-texts/post) or [inventory](/openapi/analytics#tag/Stocks-Report) report.
        <br><br>

        Each new report must have a unique ID.

        <div class="description_important">
          Do not use the same ID for different reports — this may cause errors during generation
        </div>

        The set of parameters in the `params` object depends on the report type. To get a description of the parameters, select the report type from the dropdown list in the description of the `reportType` parameter.
        <br><br>
        The parameters `includeSubstitutedSKUs` and `includeSearchTexts` cannot both be set to `false`
        <br><br>
        If it was not possible to [get report](/openapi/analytics#tag/Seller-Analytics-CSV/paths/~1api~1v2~1nm-report~1downloads~1file~1%7BdownloadId%7D/get), you can create a [repeat generation task](/openapi/analytics#tag/Seller-Analytics-CSV/paths/~1api~1v2~1nm-report~1downloads~1retry/post). You can also [get a list and check the statuses](/openapi/analytics#tag/Seller-Analytics-CSV/paths/~1api~1v2~1nm-report~1downloads/get) of reports.

        <div class="description_important">
          <a href="https://seller.wildberries.ru/content-analytics/history-remains">Inventory reports</a> — the <code>STOCK_HISTORY_REPORT_CSV</code> and <code>STOCK_HISTORY_DAILY_CSV</code> types — can be created without <a href="https://seller.wildberries.ru/monetization/jam">Jam</a> subscription
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/SalesFunnelItemReq'
                - $ref: '#/components/schemas/SalesFunnelGroupReq'
                - $ref: '#/components/schemas/SearchReportGroupReq'
                - $ref: '#/components/schemas/SearchReportItemReq'
                - $ref: '#/components/schemas/SearchReportTextReq'
                - $ref: '#/components/schemas/InventoryMetricsReportReq'
                - $ref: '#/components/schemas/InventoryHistoryReportReq'
              discriminator:
                propertyName: reportType
                mapping:
                  DETAIL_HISTORY_REPORT: '#/components/schemas/SalesFunnelItemReq'
                  GROUPED_HISTORY_REPORT: '#/components/schemas/SalesFunnelGroupReq'
                  SEARCH_QUERIES_PREMIUM_REPORT_GROUP: '#/components/schemas/SearchReportGroupReq'
                  SEARCH_QUERIES_PREMIUM_REPORT_PRODUCT: '#/components/schemas/SearchReportItemReq'
                  SEARCH_QUERIES_PREMIUM_REPORT_TEXT: '#/components/schemas/SearchReportTextReq'
                  STOCK_HISTORY_REPORT_CSV: '#/components/schemas/InventoryMetricsReportReq'
                  STOCK_HISTORY_DAILY_CSV: '#/components/schemas/InventoryHistoryReportReq'
            examples:
              SalesFunnelItemReq:
                description: Sales funnel report. By WB item numbers
                value:
                  id: 06eae887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: DETAIL_HISTORY_REPORT
                  userReportName: Listing report
                  params:
                    nmIDs:
                      - 1234567
                    subjectIds:
                      - 1234567
                    brandNames:
                      - Name
                    tagIds:
                      - 1234567
                    startDate: '2024-06-21'
                    endDate: '2024-06-23'
                    timezone: Europe/Moscow
                    aggregationLevel: day
                    skipDeletedNm: false
              SalesFunnelGroupReq:
                description: Sales funnel report. By categories, brands and labels
                value:
                  id: 06eea887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: GROUPED_HISTORY_REPORT
                  userReportName: Subcategory report
                  params:
                    subjectIds:
                      - 1234567
                    brandNames:
                      - Name
                    tagIds:
                      - 1234567
                    startDate: '2024-06-21'
                    endDate: '2024-06-23'
                    timezone: Europe/Moscow
                    aggregationLevel: day
                    skipDeletedNm: false
              SearchReportGroupReq:
                description: Search parameters report. By categories, brands, and labels
                value:
                  id: 06eae887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: SEARCH_QUERIES_PREMIUM_REPORT_GROUP
                  userReportName: Subcategory report
                  params:
                    currentPeriod:
                      start: '2024-02-10'
                      end: '2024-02-10'
                    pastPeriod:
                      start: '2024-02-08'
                      end: '2024-02-08'
                    nmIds:
                      - 162579635
                      - 166699779
                    subjectIds:
                      - 64
                      - 334
                    brandNames:
                      - nikkle
                      - abikas
                    tagIds:
                      - 32
                      - 53
                    orderBy:
                      field: avgPosition
                      mode: asc
                    positionCluster: all
                    includeSubstitutedSKUs: true
                    includeSearchTexts: false
              SearchReportItemReq:
                description: Search parameters report. By WB item numbers
                value:
                  id: 06eea887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: SEARCH_QUERIES_PREMIUM_REPORT_PRODUCT
                  userReportName: Listing report
                  params:
                    currentPeriod:
                      start: '2024-02-10'
                      end: '2024-02-10'
                    pastPeriod:
                      start: '2024-02-08'
                      end: '2024-02-08'
                    subjectId: 123
                    brandName: Abble
                    tagId: 45
                    nmIds:
                      - 162579635
                      - 166699779
                    orderBy:
                      field: buyoutCount
                      mode: asc
                    positionCluster: all
                    includeSubstitutedSKUs: false
                    includeSearchTexts: true
              SearchReportTextReq:
                description: Search texts report
                value:
                  id: 06eae887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: SEARCH_QUERIES_PREMIUM_REPORT_TEXT
                  userReportName: Subcategory report
                  params:
                    currentPeriod:
                      start: '2024-02-10'
                      end: '2024-02-10'
                    pastPeriod:
                      start: '2024-02-08'
                      end: '2024-02-08'
                    nmIds:
                      - 162579635
                      - 166699779
                    subjectIds:
                      - 64
                      - 334
                    brandNames:
                      - nikkle
                      - abikas
                    tagIds:
                      - 32
                      - 53
                    topOrderBy: openCard
                    orderBy:
                      field: avgPosition
                      mode: asc
                    includeSubstitutedSKUs: true
                    includeSearchTexts: true
                    limit: 50
              InventoryMetricsReportReq:
                description: Inventory metrics report
                value:
                  id: 06eae887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: STOCK_HISTORY_REPORT_CSV
                  userReportName: Inventory report
                  params:
                    nmIDs:
                      - 111222333
                      - 444555666
                    subjectIDs:
                      - 123
                      - 456
                    brandNames:
                      - ЭгКа
                      - Stock
                    tagIDs:
                      - 3
                      - 4
                      - 5
                    currentPeriod:
                      start: '2024-02-10'
                      end: '2024-02-10'
                    stockType: mp
                    skipDeletedNm: true
                    availabilityFilters:
                      - deficient
                      - balanced
                    orderBy:
                      field: avgOrders
                      mode: asc
              InventoryHistoryReportReq:
                description: Inventory history report
                value:
                  id: 06eae887-9d9f-491f-b16a-bb1766fcb8d2
                  reportType: STOCK_HISTORY_DAILY_CSV
                  userReportName: Inventory report
                  params:
                    nmIds:
                      - 111222333
                      - 444555666
                    subjectIds:
                      - 123
                      - 456
                    brandNames:
                      - ЭгКа
                      - Stock
                    tagIds:
                      - 3
                      - 4
                      - 5
                    currentPeriod:
                      start: '2025-12-13'
                      end: '2025-12-15'
                    stockType: ''
                    skipDeletedNm: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NmReportCreateReportResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
                required:
                  - title
                  - detail
                  - requestId
                  - origin
              examples:
                errorExample:
                  value:
                    title: Invalid request body
                    detail: userReportName can not contain emojis
                    requestId: 51b7828b-e298-4dfa-b7cd-45ab179921d3
                    origin: analytics-open-api
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
              examples:
                errorExample:
                  value:
                    title: Authorization error
                    detail: Authorization error
                    requestId: 51b7828b-e298-4dfa-b7cd-45ab179921d3
                    origin: analytics-open-api
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/response429Download'
                  - $ref: '#/components/schemas/response429DownloadDaily'
    get:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Seller Analytics CSV
      security:
        - HeaderApiKey: []
      summary: Get the Reports List
      description: |
        The method provides a list of reports with advanced seller analytics. The response contains [report IDs](/openapi/analytics#tag/Seller-Analytics-CSV/paths/~1api~1v2~1nm-report~1downloads/post) and generation statuses.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      parameters:
        - in: query
          name: filter[downloadIds]
          description: Report ID
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NmReportGetReportsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
                required:
                  - title
                  - detail
                  - requestId
                  - origin
              examples:
                errorExample:
                  value:
                    title: Invalid request body
                    detail: download id was not found
                    requestId: 51b7828b-e298-4dfa-b7cd-45ab179921d3
                    origin: analytics-open-api
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
              examples:
                errorExample:
                  value:
                    title: Authorization error
                    detail: Authorization error
                    requestId: 51b7828b-e298-4dfa-b7cd-45ab179921d3
                    origin: analytics-open-api
        '429':
          $ref: '#/components/responses/429'
  /api/v2/nm-report/downloads/retry:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
