  /api/v2/search-report/report:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Search Queries for Your Items
      summary: Main Page
      description: |
        Forms a dataset for the main report page with:
          - General information
          - Item positions
          - Data on visibility and transitions to the listing
          - Data for the table by groups

        To get additional data in the table, use a separate request for:
          - Pagination by groups
          - Retrieval of items within a group

        Additional parameters for selecting the list of items in the table:
          - `positionCluster` — average position in search

        The parameters `includeSubstitutedSKUs` and `includeSearchTexts` cannot both be set to `false`.<br><br>

        The report data is updated once an hour.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MainRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponseProperties'
                  - type: object
                    required:
