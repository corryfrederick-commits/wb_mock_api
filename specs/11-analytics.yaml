        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NmReportRetryReportRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NmReportRetryReportResponse'
