              2) `"hours":-2` — zero duration
              3) `"hours":-3` — uncalculated duration
          type: object
          properties:
            days:
              type: integer
              format: int32
              example: 5
              description: Number of days
            hours:
              type: integer
              format: int32
              example: 15
              description: Number of hours
          required:
            - days
