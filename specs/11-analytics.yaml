led in if the previous period is specified) |\n| IsSubstitutedSKU | boolean | bool | If the item was searched by the promo item. This will be in the response if the request contains `includeSubstitutedSKUs` and/or `includeSearchTexts` |\n| Currency | string | string | Report currency |\n\n\n**Search texts report**\n\n| Name | Type | Format | Description |\n|-----------------| --- | --- | --- |\n| Text | string\t| string | Search text |\n| NmID | integer | int64 | WB item number |\n| SubjectName | string\t| string | Subcategory name |\n| BrandName | string | string  | Brand |\n| VendorCode | string | string | Seller item number |\n| Name | string\t| string | Item name |\n| Rating | float | float64 | Listing rating. If there is no rating, the value will be `no rating` |\n| FeedbackRating | float | float64 | Feedbacks rating |\n| MinPrice | integer | uint64 | Minimal seller price with seller discount (excluding WB Club discount) |\n| MaxPrice | integer | uint64 | Maximal seller price with seller discount (excluding WB Club discount) |\n| Frequency | integer | uint64 | Number of the search text requests in the current period |\n| MedianPosition | float | float64 | Median position of the item search in the current period. Only positions from which users added the proitem the cart or visited its page are considered. It is the middle value of the position in search results, which excludes significant deviations from the average |\n| AveragePosition | integer | uint64 | Average item position in search results in the current period. Only positions from which users added the item to the cart or visited its page are considered |\n| OpenCard | integer | uint64 | Click-throughs from search in the current period |\n| OpenCardPercentile | float | float64 | The percentage by which click-throughs is higher than that of other sellers' pages for the search text |\n| AddToCart | integer | uint64 | Adds-to-Cart in search results in the current period |\n| AddToCartPercentile | float | f