            avgPosition:
              description: Average item position in search results
              type: object
              properties:
                current:
                  example: 5
                  description: Current average position
                  type: integer
                dynamics:
                  example: 50
                  description: Dynamics compared to the previous period (%)
                  type: integer
              required:
                - current
            openCard:
              description: Click-throughs from search
              type: object
              properties:
                current:
