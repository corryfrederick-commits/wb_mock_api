  /api/v2/stocks-report/products/sizes:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Stocks Report
      summary: Size Data
      description: |
        Forms a dataset for inventory by the size of the item.
        <br><br>
        Possible cases:
        1. The item has dimensions and `"includeOffice":true`, then the response body will contain data on the inventory for each of the sizes with nested details by warehouse.
        2. The item has dimensions and `"includeOffice":false`, then the response body will contain data on the inventory for each of the sizes without nested details by warehouse.
        3. The item has no size and `"include Office":true`, then the response body will contain details by warehouse without data on the inventory for each of the sizes.
        4. The item has no size and `"include Office":false`, then the response body will be empty.<br></br>
        `The item has no size` means the size of the item is the same and has `"techSize":"0"`. In responses of the method for getting data on [items](/openapi/analytics#tag/Stocks-Report/paths/~1api~1v2~1stocks-report~1products~1products/post), such items have `hasSizes':false`.
        <br><br>
        The data on the seller warehouses are in an aggregated form — for all of them together without detailing specific warehouses —  and responses contain `"regionName":"Маркетплейс"` and `"officeName":""` in such cases.<br><br>

        The report data is updated once an hour.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 3 requests | 20 s | 3 requests |
        | Service | 1 min | 3 requests | 20 s | 3 requests |
        | Base with secret | 1 min | 3 requests | 20 s | 3 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableSizeRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TableSizeResponse'
                required:
                  - data
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorObject403'
        '429':
          $ref: '#/components/responses/429'
