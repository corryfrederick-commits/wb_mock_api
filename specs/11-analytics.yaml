arch in the current period |\n| Orders | integer | uint64 | Items ordered from search in the current period |\n| CartToOrder | integer | uint64 | Conversion to order from search in the current period |\n| Visibility  |integer | uint64 | Visibility in search results in the current period. Probability percentage that a user will see the listing. Depends on the average position |\n| AveragePositionPast | integer | uint64 | Average item position in search results in the past period (filled in if the previous period is specified) |\n| OpenCardPast | integer | uint64 | Click-throughs from search in the past period (filled in if the previous period is specified) |\n| AddToCartPast | integer | uint64 | Adds-to-Cart from search in the past period (filled in if the previous period is specified) |\n| OpenToCartPast | integer | uint64 | Conversion to cart from search in the past period filled in if the previous period is specified) |\n| OrdersPast | integer | uint64 | Items ordered from search in the past period (filled in if the previous period is specified) |\n| CartToOrderPast | integer | uint64 | Conversion to order from search in the past period (filled in if the previous period is specified) |\n| VisibilityPast | integer | uint64 | Visibility in search results in the past period. Probability percentage that a user will see the listing. Depends on the average position (filled in if the previous period is specified) |\n\n\n**Search parameters report. By WB item numbers**\n\n| Name | Type | Format | Description |\n|-----------------| --- | --- | --- |\n| NmID | integer | int64 | WB item number |\n| VendorCode | string | string | Seller item number |\n| Name | string\t| string | Item name |\n| SubjectName | string\t| string | Subcategory name |\n| BrandName | string | string  | Brand |\n| IsAdvertised | boolean | bool\t| Is the item being promoted in search results |\n| IsRated | boolean | bool | Is there an opportunity to rate the listing quality |\n| Rating | float | float6