  /content/v2/get/cards/list:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      tags:
        - Listings
      summary: Listings
      description: |
        Returns the list of listings.<br>

        <div class="description_important">
          Listings from the trash are not provided in the method response. You can get these listings via <a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1trash/post">different method</a>
        </div>

        To get **more than 100** listings, use pagination:
          1. Make the first request:
              <pre>
                {
                  "settings": {
                    "sort": {
                      "ascending": true
                    },
                    "cursor": {
                      "limit": 100
                    },
                    "filter": {
                      "withPhoto": -1
                    }
                  }
                }</pre>
             To get only new or updated listings after data export, use ascending sorting: `"sort":{"ascending":true}`.
          2. Copy `"updatedAt": "***","nmID":"***"` from the `cursor` in the response and insert into the `cursor` of your next request.
          3. Make the next request.
          4. Repeat 2 and 3 until `total` value in the response is less than the `limit` value in the request. This will mean you got all listings.

        To get only items that were listed or updated after the previous data export:
          1. Save the `"cursor":{"updatedAt":"***","nmID":"***"}` fields from the last response of the previous data export. When exporting the data, use ascending sorting: `"sort":{"ascending":true}`.
          2. Specify the saved `"cursor":{"updatedAt":"***","nmID":"***"}` fields in the first request. Keep using ascending sorting.
          3. Save the `"cursor":{"updatedAt":"***","nmID":"***"}` fields from the last response of the current data export.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 100 requests | 600 ms | 5 requests |

        Exceptions are the methods:
        <ul>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post">creating product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post">creating product cards with merge</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post">editing product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post">getting failed product cards with errors</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post">transfering product card to trash</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post">recovering product card from trash</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList">getting item recommendation list</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet">setting item recommendations</a></li>
        </ul>
        </div>
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            example: ru
          description: |
            Language for response of the `name`, `value` and `object` fields:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese

            Not used in the sandbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  description: Settings
                  properties:
                    sort:
                      description: Sort by
                      type: object
                      properties:
                        ascending:
                          type: boolean
                          default: false
                          description: |
                            Sort by the `updatedAt` field:
                              - `false` — descending
                              -  `true` — ascending
                    filter:
                      description: Filters
                      type: object
                      properties:
                        withPhoto:
                          type: integer
                          enum:
                            - -1
                            - 0
                            - 1
                            - 2
                          description: |
                            Photo:
                              * `-1` — any listings
                              * `0` — only listings without photos. Starting from [June 16](https://dev.wildberries.ru/en/release-notes?id=531) — any listings
                              * `1` — only listings with photos
                              * `2` — only listings without photos. Starting from [June 16](https://dev.wildberries.ru/en/release-notes?id=531)
                          default: 0
                        textSearch:
                          type: string
                          description: Seller item number, Wildberries item number or SKU search
                        tagIDs:
                          type: array
                          description: Label ID search
                          items:
                            type: integer
                        allowedCategoriesOnly:
                          description: |
                            Category:
                              - `true` — permitted
                              - `false` — forbidden
                          type: boolean
                        objectIDs:
                          type: array
                          description: Subcategory ID search
                          items:
                            type: integer
                        brands:
                          type: array
                          description: Brand search
                          items:
                            type: string
                        imtID:
                          description: Merged listing ID search
                          type: integer
                    cursor:
                      description: |
                        Cursor
                      type: object
                      properties:
                        limit:
                          type: integer
                          maximum: 100
                          default: 10
                          description: Number of listings in response
                        updatedAt:
                          type: string
                          nullable: true
                          description: Update date and time
                        nmID:
                          type: integer
                          description: WB item number for next listing page
            example:
              settings:
                sort:
                  ascending: false
                filter:
                  textSearch: '4603743187500888'
                  allowedCategoriesOnly: true
                  tagIDs:
                    - 345
                    - 415
                  objectIDs:
                    - 235
                    - 67
                  brands:
                    - уллу
                    - EkkE
                  imtID: 328632
                  withPhoto: 0
                cursor:
                  updatedAt: '2023-12-06T11:17:00.96577Z'
                  nmID: 370870300
                  limit: 11
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    description: Listings
                    items:
                      type: object
                      properties:
                        nmID:
                          type: integer
                          description: WB item number
                        imtID:
                          type: integer
                          description: |
                            Merged listing ID.<br>
                            The same for all WB item number of group of merged listings.<br>
                            Every listing has `imtID`, even if is not merged with any other listing
                        nmUUID:
                          type: string
                          format: UUID
                          description: Internal system ID of the listing
                        subjectID:
                          type: integer
                          description: Subcategory ID
                        subjectName:
                          type: string
                          description: Subcategory name
                        vendorCode:
                          type: string
                          description: Seller item number
                        brand:
                          type: string
                          description: Brand
                        title:
                          type: string
                          description: Item title
                        description:
                          type: string
                          description: Item description
                        needKiz:
                          description: |
                            Is labeling code [Chestny ZNAK](https://chestnyznak.ru/en) required for the item:
                            <br>
                              - `false` — labeling code is not required
                            <br>
                              -`true` — labeling code is required
                          type: boolean
                        kizMarked:
                          type: boolean
                          default: false
                          nullable: false
                          description: |
                            Is there the confirmation from the seller that required labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is applied to the item:
                              - `true` — yes
                              - `false` — no

                            Whether labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is required is specified in the `needKiz` field
                        photos:
                          type: array
                          description: Photo array
                          items:
                            type: object
                            properties:
                              big:
                                description: URL of `900x1200` photo
                                type: string
                              c246x328:
                                description: URL of `248x328` photo
                                type: string
                              c516x688:
                                description: URL of `516x688` photo
                                type: string
                              square:
                                description: URL of `600x600` photo
                                type: string
                              tm:
                                description: URL of `75x100` photo
                                type: string
                        video:
                          type: string
                          description: Video URL
                        wholesale:
                          type: object
                          description: Wholesale
                          properties:
                            enabled:
                              type: boolean
                              description: Is the listing intended for wholesale
                            quantum:
                              type: number
                              format: uint64
                              description: Number of item units per package
                        dimensions:
                          description: Dimensions and weight of packed item in cm and kg
                          type: object
                          properties:
                            length:
                              type: integer
                              description: Length, cm
                            width:
                              type: integer
                              description: Width, cm
                            height:
                              type: integer
                              description: Height, cm
                            weightBrutto:
                              type: number
                              description: Weight, kg<br>Number of decimal places <=3
                            isValid:
                              type: boolean
                              description: |
                                Potential inaccuracy of item dimensions:

                                - `true` — not detected. `"isValid": true` does not guarantee that the dimensions are correct. In some cases (for example, when creating a new item category), `"isValid": true` will be returned for any values except zero.

                                - `false` — the specified dimensions significantly differ from the average for the category (subcategory). it is recommended to double-check whether the item dimensions in the packaging are correctly specified in `centimeters`. The functionality of the listing, including the calculation of logistics and storage, will not be limited. Logistics and storage will continue to be calculated based on the current dimensions. Also, `"isValid": false` is returned when there are missing values or any dimension is zero.
                        characteristics:
                          type: array
                          description: Characteristics
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Characteristic ID
                              name:
                                type: string
                                description: Characteristic name
                              value:
                                description: Characteristic value
                        sizes:
                          type: array
                          description: Item sizes
                          items:
                            type: object
                            properties:
                              chrtID:
                                type: integer
                                description: Size ID
                              techSize:
                                type: string
                                description: Size (for example, S or 42)
                              wbSize:
                                type: string
                                description: Russian size
                              skus:
                                type: array
                                description: SKU
                                items:
                                  type: string
                                  example: 12345Ejf5
                        tags:
                          description: Labels
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Label ID
                              name:
                                type: string
                                description: Label name
                              color:
                                type: string
                                description: |
                                  Label color:
                                    - `D1CFD7` — grey
                                    - `FEE0E0` — red
                                    - `ECDAFF` — purple
                                    - `E4EAFF` — blue
                                    - `DEF1DD` — green
                                    - `FFECC7` — yellow
                        createdAt:
                          type: string
                          description: Creation date and time
                        updatedAt:
                          type: string
                          description: Update date and time
                  cursor:
                    type: object
                    description: Paginator
                    properties:
                      updatedAt:
                        type: string
                        description: Date and time for next listing page
                      nmID:
                        type: integer
                        description: WB item number for next listing page
                      total:
                        type: integer
                        description: Number of listings
              example:
                cards:
                  - nmID: 12345678
                    imtID: 123654789
                    nmUUID: 01bda0b1-5c0b-736c-b2be-d0a6543e9be
                    subjectID: 7771
                    subjectName: AKF системы
                    vendorCode: wb7f6mumjr1
                    kizMarked: true
                    brand: Тест
                    title: Тест-система
                    description: Тестовое описание
                    needKiz: false
                    photos:
                      - big: https://basket-10.wbbasket.ru/vol1592/part159206/159206280/images/big/1.webp
                        c246x328: https://basket-10.wbbasket.ru/vol1592/part159206/159206280/images/c246x328/1.webp
                        c516x688: https://basket-10.wbbasket.ru/vol1592/part159206/159206280/images/c516x688/1.webp
                        square: https://basket-10.wbbasket.ru/vol1592/part159206/159206280/images/square/1.webp
                        tm: https://basket-10.wbbasket.ru/vol1592/part159206/159206280/images/tm/1.webp
                    video: https://videonme-basket-12.wbbasket.ru/vol137/part22557/225577433/hls/1440p/index.m3u8
                    wholesale:
                      enabled: true
                      quantum: 112
                    dimensions:
                      length: 55
                      width: 40
                      height: 15
                      weightBrutto: 6.24
                      isValid: false
                    characteristics:
                      - id: 14177449
                        name: Цвет
                        value:
                          - красно-сиреневый
                    sizes:
                      - chrtID: 316399238
                        techSize: '0'
                        skus:
                          - '987456321654'
                    tags:
                      - id: 592569
                        name: Популярный
                        color: D1CFD7
                    createdAt: '2023-12-06T11:17:00.96577Z'
                    updatedAt: '2023-12-06T11:17:00.96577Z'
                cursor:
                  updatedAt: '2023-12-06T11:17:00.96577Z'
                  nmID: 123654123
                  total: 1
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
            plain/text:
              example: Request body can not be decoded
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
