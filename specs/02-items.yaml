          description: Error details
          type: string
          example: Search string length limit exceeded, maximum 72 required
    SetRecomReq:
      type: object
      description: Request to add or replace recommendations
      required:
        - recList
      properties:
        recList:
          type: array
          description: Item recommendations list
          maxItems: 5000
          minItems: 1
          items:
            type: object
            properties:
              nmId:
                description: WB item number
                type: integer
                default: 0
                example: 5870243
              recommendations:
                description: Recommended items
                type: array
                maxItems: 20
                minItems: 0
                items:
                  type: object
                  properties:
                    recomNm:
                      description: Recommended item WB number
                      type: integer
                      default: 0
                      example: 5870244
                    sort:
                      description: Item place in the recommendations list
                      type: integer
                      default: 20
                      maximum: 20
                      minimum: 0
                      example: 1
        replace:
          description: |
            Requested action:
              - `false` — add new recommendations to the current ones
              - `true` — replace current recommendations with the new ones
          type: boolean
          default: false
          example: true
    SetRecomRes:
      type: object
      required:
        - isError
      properties:
        isError:
          description: |
            Are there any errors:
              - `false` — No errors, completely successful
              - `true` — There are errors
          type: boolean
          example: true
        errors:
          description: Errors. If `"isError":true`
          type: array
          items:
            type: object
            description: Recommendation set errors
            required:
              - mainNm
              - message
              - recomNm
            properties:
              mainNm:
                description: The `nmId` parameter value
                type: string
                example: '5870243'
              recomNm:
                description: The `recomNm` parameter value
                type: string
                example: '5870244'
              message:
                description: Error message
                type: string
                example: The item has no photo
