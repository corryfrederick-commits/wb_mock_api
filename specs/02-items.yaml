      summary: Upload Media Files via Links
      description: "The method uploads a set of media files to a listing by specifying links in the request.\n\n<div class=\"description_important\">\n  New media files (<code>data</code>) replace old ones (<code>mediaFiles</code>). To add new files, set links both to\_new and old files.\n</div>\n\nRequirements for links:\n  * the link must directly lead to the file. Ensure the link does not lead to a preview or authorization page. If the link leads to TXT or HTML page, it is considered incorrect\n  * no authorization is required to access the file via the link\n\nRequirements for images:\n  * maximum images for\_each listing\_— 30\n  * minimal resolution – 700\_×\_900 pixels\n  * maximum size\_— 32\_MB\n  * minimal quality\_— 65%\n  * formats\_— JPG, PNG, BMP, GIF (static), WebP\n\n\nRequirements for video:\n  * maximum one video for\_each listing\n  * maximum size\_— 50\_MB\n  * formats\_— MOV, MP4\n\n\nIf one or several images or a video do not meet the requirements, no images and a video will be uploaded even if you have the success response\_(`200`)\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Introduction/Rate-Limits\">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:\n\n| Period | Limit | Interval | Burst |\n| --- | --- | --- | --- |\n| 1 min | 100 requests | 600 ms | 5 requests |\n\nExceptions are the methods:\n<ul>\n    <li><a href=\"/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post\">creating product cards</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post\">creating product cards with merge</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post\">editing product cards</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post\">getting failed product cards with errors</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post\">transfering product card to trash</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post\">recovering product card from trash</a></li>\n    <li><a href=\"/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList\">getting item recommendation list</a></li>\n    <li><a href=\"/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet\">setting item recommendations</a></li>\n</ul>\n</div>\n"
      tags:
        - Media Files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nmId:
                  description: Wildberries item number
                  type: integer
                data:
                  description: Links to images in the order that they are on the listing, and a video at any position of the array
                  type: array
                  items:
                    type: string
            example:
              nmId: 213864079
              data:
                - https://basket-stage-02.dasec.ru/vol669/part66964/66964260/images/big/2.jpg
                - https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_mb.mp4
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                  error:
                    description: Error flag
                    type: boolean
                  errorText:
                    description: Error description
                    type: string
                  additionalErrors:
                    nullable: true
                    description: Additional errors
                    type: object
              example:
                data: {}
                error: false
                errorText: ''
                additionalErrors: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
        '409':
          description: Error saving some of the links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
        '422':
          description: The parameter nmId is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
        '429':
          $ref: '#/components/responses/429'
