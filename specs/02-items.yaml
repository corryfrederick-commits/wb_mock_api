  /content/v2/cards/update:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: false
      x-category: content
      tags:
        - Listings
      summary: Update Listings
      description: |
        Edits listings. Also use it to add new sizes.

        <div class="description_important">
          The listing is overwritten when updated. So the request must also include those listing parameters that you are not going to update. To get their values, use <a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1list/post">Listings</a> and <a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1trash/post">Listings in Trash</a>.
        </div>

        You cannot use this method to update or delete:
          - item size SKUs. You can only add additional SKUs
          - the `photos`, `video` and `tags` parameters
          - prices of items. The price can only be set if you add new sizes

        When adding a new size, specify its price using the `price` parameter. If no `price` is specified in the request, the size price will be `0`. In this case, you can update it using the methods:
          - [Set Prices and Discounts](/openapi/work-with-products#tag/Prices-and-Discounts/paths/~1api~1v2~1upload~1task/post), if [item](/openapi/work-with-products#tag/Prices-and-Discounts/paths/~1api~1v2~1list~1goods~1filter/get) has `"editablePriceSize":false`
          - [Set Size Prices](/openapi/work-with-products#tag/Prices-and-Discounts/paths/~1api~1v2~1upload~1task~1size/post), if [item](/openapi/work-with-products#tag/Prices-and-Discounts/paths/~1api~1v2~1list~1goods~1filter/get) has `"editablePriceSize":true`

        The dimensions of the items can only be specified in `centimeters`, and the weight of packed items must be specified in `kilograms`.
        <br><br>
        If this method response is Success (`200`) but listing was not updated, check errors using [failed listings with errors](/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1error~1list/post) method.<br>
        With one request you can edit maximum 3000 listings (`nmID`). Maximum request size is 10 Mb.<br>
        The process of synchronizing data with services may take up to 30 minutes. During this time, you can't add inventory to warehouses and set prices.


        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 10 requests | 6 s | 5 requests |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - nmID
                  - vendorCode
                  - sizes
                minimum: 1
                maximum: 3000
                properties:
                  nmID:
                    type: integer
                    description: WB item number
                  vendorCode:
                    type: string
                    description: Seller item number
                  kizMarked:
                    type: boolean
                    default: false
                    description: |
                      Confirmation that required labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is specified:
                        - `true` — the seller confirms that required labeling code is applied to the item.
                        - `false` — the seller does not confirm that required labeling code is applied to the item. Pass `true` in the request to confirm that the item has required labeling code. The item will not pass moderation if there is no confirmation from the seller that required labeling code is applied to the item.

                      To check if labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is required, use the [Listings](./work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1list/post) method, the response field `needKiz`
                  brand:
                    type: string
                    description: Brand
                  title:
                    type: string
                    description: Item title
                    maxLength: 60
                  description:
                    type: string
                    description: |
                      Item description.<br>
                      The maximum number of characters depends on the item category<br>
                      Standard — 2000, minimum — 1000, maximum — 5000<br>
                      More details about **rules for filling out the listing** in [Instructions](https://seller.wildberries.ru/instructions/ru/ru/material/how-to-create-card) category of sellers portal
                  dimensions:
                    description: |
                      Dimensions and weight of the item **with packaging**. <br>
                      Specify in `centimeters` and `kilograms` for any item. <br>
                      The process of synchronizing new data with service may take up to 30 minutes
                    type: object
                    properties:
                      length:
                        type: integer
                        description: Length, cm
                      width:
                        type: integer
                        description: Width, cm
                      height:
                        type: integer
                        description: Height, cm
                      weightBrutto:
                        type: number
                        description: Weight, kg<br>Number of decimal places <=3
                  characteristics:
                    type: array
                    description: |
                      Item characteristics
                      <br>
                      Use the [Subcategory characteristics](./work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method to get characteristics of the item
                    items:
                      type: object
                      required:
                        - id
                        - value
                      properties:
                        id:
                          type: integer
                          description: Characteristic ID
                        value:
                          description: |
                            Characteristic values.
                            <br>
                            Data type — array of strings or number — depends on the characteristic data type. For more details see the description of the `charcType` field in the [Subcategory characteristics](./work-with-products#tag/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method.
                            <br>
                            The allowed number of values is specified in the `maxCount` field of the [Subcategory characteristics](./work-with-products#tag/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method
                  sizes:
                    type: array
                    description: |
                      Item sizes<br>
                      If item has no sizes, send only SKUs
                    items:
                      type: object
                      properties:
                        chrtID:
                          type: integer
                          description: |
                            WB item number of this size<br>
                            Required for existing sizes<br>
                            If you add new size, do not send this ID
                        techSize:
                          type: string
                          description: Size (for example, XL, S, 45)
                        wbSize:
                          type: string
                          description: Russian size
                        price:
                          type: integer
                          description: |
                            Price, ₽<br>
                            Specified when adding the size
                        skus:
                          type: array
                          items:
                            type: string
                          description: SKUs
              example:
                - nmID: 11111111
                  vendorCode: wbiz72wmro
                  kizMarked: true
                  brand: ''
                  title: Свитер женский оверсайз с горлом
                  description: '12345'
                  dimensions:
                    length: 35
                    width: 40
                    height: 15
                    weightBrutto: 3
                  characteristics:
                    - id: 14177450
                      value:
                        - хлопок 50% акрил 50%
                    - id: 50
                      value:
                        - свободный крой
                  sizes:
                    - chrtID: 12345678
                      techSize: ONE SIZE
                      wbSize: 78-90
                      skus:
                        - '123487653460134'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseItemList'
              example:
                data: null
                error: false
                errorText: ''
                additionalErrors: {}
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
              examples:
                MissingRequiredCharacteristics:
                  $ref: '#/components/examples/MissingRequiredCharacteristics'
                NonUniqueCharacteristicsInOneGroupAdd:
                  $ref: '#/components/examples/NonUniqueCharacteristicsInOneGroupAdd'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
        '413':
          description: The request body size exceeds the given limit
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  code:
                    type: string
                    description: Internal error code
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
                  status:
                    type: number
                    description: HTTP status code
                  statusText:
                    type: string
                    description: Text of the HTTP status code
              example:
                title: request body too long
                detail: https://openapi.wildberries.ru/content/api/ru/
                code: 71d3de1b-001e-488f-bbf5-55c31254fbeb
                requestId: MN8usr6RfrzWHZfucSvNgb
                origin: s2s-api-auth-content
                status: 413
                statusText: Request Entity Too Large
        '429':
          $ref: '#/components/responses/429'
  /content/v2/cards/moveNm:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
