      summary: List Items with Merge
      description: |
        The method lists items by merging it with existing individual listings and groups of merged listings. There can be no more than 30 listings in one group of merged listings, respectively, you can list no more than 29 items in one request.
        <br><br>
        The dimensions of the items can only be specified in `centimeters`, and the weight of packed items must be specified in `kilograms`.<br>
        If this method response is Success (`200`) but listing was not updated, check errors using [failed listings with errors](/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1error~1list/post) method.<br>
        Items are listed asynchronously. The process of synchronizing a new listing with services may take up to 30 minutes. During this time, you can't add inventory to warehouses and set prices.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 10 requests | 6 s | 5 requests |
        | Service | 1 min | 10 requests | 6 s | 5 requests |
        | Base with secret | 1 min | 10 requests | 6 s | 5 requests |
        | Base | 2 h | 1 request | 2 h | 1 request |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                imtID:
                  type: integer
                  description: |
                    `imtID` of an individual listing or group of merged listings to which the listed items are added
                cardsToAdd:
                  description: Added listings
                  type: array
                  items:
                    type: object
                    required:
                      - vendorCode
                    minimum: 1
                    maximum: 29
                    properties:
                      brand:
                        type: string
                        description: Brand
                      vendorCode:
                        type: string
                        description: Seller item number
                        maxLength: 72
                      kizMarked:
                        type: boolean
                        default: false
                        description: |
                          Confirmation that required labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is specified:
                            - `true` — the seller confirms that required labeling code is applied to the item.
                            - `false` — the seller does not confirm that required labeling code is applied to the item. Pass `true` in the request to confirm that the item has required labeling code. The item will not pass moderation if there is no confirmation from the seller that required labeling code is applied to the item.

                          To check if labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is required, use the [Listings](./work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1list/post) method, the response field `needKiz`
                      wholesale:
                        type: object
                        description: Wholesale
                        properties:
                          enabled:
                            type: boolean
                            description: Is the listing intended for wholesale
                          quantum:
                            type: number
                            format: uint64
                            description: Number of item units per package
                      title:
                        type: string
                        description: Item title
