openapi: 3.0.1
info:
  title: Item Management
  version: items
  description: |
    <div class="api-block">

    Use the methods in this section to:
      - [list items](/openapi/work-with-products#tag/listingItems) and [edit listings](/openapi/work-with-products#tag/listings)
      - get [item categories, subcategories, characteristics, and brands](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics)
      - upload [media files](/openapi/work-with-products#tag/mediaFiles) for listings
      - set up [labels](/openapi/work-with-products#tag/labels) for item search
      - work with item [recommendations](/openapi/work-with-products#tag/recommendations)
      - set [prices and discounts](/openapi/work-with-products#tag/Prices-and-Discounts)
      - manage [item inventory](/openapi/work-with-products#tag/Seller-Warehouses-Inventory) and [warehouses](/openapi/work-with-products#tag/Seller-Warehouses), if you work with the sales model from the seller warehouse

    </div>
  x-file-name: items
security:
  - HeaderApiKey: []
tags:
  - name: Categories, Subcategories, and Characteristics
    x-displayName: Categories, Subcategories, and Characteristics
    description: ''
  - name: Listing Items
    x-displayName: Listing Items
    description: ''
  - name: Listings
    x-displayName: Listings
    description: ''
  - name: Media Files
    x-displayName: Media Files
    description: ''
  - name: Labels
    x-displayName: Labels
    description: ''
  - name: Recommendations
    x-displayName: Recommendations
    description: ''
  - name: Prices and Discounts
    description: ''
  - name: Seller Warehouses
    description: ''
  - name: Seller Warehouses Inventory
    description: ''
paths:
  /content/v2/object/parent/all:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Item Parent Categories
      description: |
        Returns the list of all item parent categories

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 100 requests | 600 ms | 5 requests |

        Exceptions are the methods:
        <ul>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post">creating product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post">creating product cards with merge</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post">editing product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post">getting failed product cards with errors</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post">transfering product card to trash</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post">recovering product card from trash</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList">getting item recommendation list</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet">setting item recommendations</a></li>
        </ul>
        </div>
      tags:
        - Categories, Subcategories, and Characteristics
      parameters:
        - name: locale
          in: query
          description: |
            Language for response of the `name` field:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese

            Not used in the sandbox
          schema:
            type: string
            example: en
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    items:
                      type: object
                      properties:
                        name:
                          description: Category name
                          type: string
                          example: Электроника
                        id:
                          description: Parent category ID
                          type: integer
                          example: 479
                        isVisible:
                          description: Visibility on the site
                          type: boolean
                          example: true
                  error:
                    description: Error flag
                    type: boolean
                    example: false
                  errorText:
                    description: Error description
                    type: string
                    example: ''
                  additionalErrors:
                    description: Additional errors
                    nullable: true
                    type: string
                    example: ''
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
        '429':
          $ref: '#/components/responses/429'
  /content/v2/object/all:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Subcategories List
      description: |
        Returns the list of all available subcategories, parent categories and their IDs

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 100 requests | 600 ms | 5 requests |

        Exceptions are the methods:
        <ul>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post">creating product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post">creating product cards with merge</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post">editing product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post">getting failed product cards with errors</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post">transfering product card to trash</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post">recovering product card from trash</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList">getting item recommendation list</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet">setting item recommendations</a></li>
        </ul>
        </div>
      tags:
        - Categories, Subcategories, and Characteristics
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            example: en
          description: |
            Language for response of the `name` field:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese

            Not used in the sandbox
        - name: name
          in: query
          schema:
            type: string
            example: Socks
          description: Search by item name (Socks), the search works by substring and can be conducted in any of the supported languages
        - name: limit
          in: query
          schema:
            type: integer
            example: 1000
            default: 30
          description: Number of search results, maximum 1,000
        - name: offset
          in: query
          schema:
            type: integer
            example: 5000
            default: 0
          description: How many results to skip. For example, with value `10`, the response will start with the 11 element
        - name: parentID
          in: query
          schema:
            type: integer
            example: 1000
          description: Subcategory parent category ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Categories and subcategories
                    items:
                      type: object
                      properties:
                        subjectID:
                          type: integer
                          description: Subcategory ID
                        parentID:
                          type: integer
                          description: Parent category ID
                        subjectName:
                          type: string
                          description: Subcategory name
                        parentName:
                          type: string
                          description: Parent category name
                  error:
                    type: boolean
                    description: Error flag
                  errorText:
                    type: string
                    description: Error text
                  additionalErrors:
                    nullable: true
                    description: Additional errors
                    type: string
              example:
                data:
                  - subjectID: 2560
                    parentID: 479
                    subjectName: 3D очки
                    parentName: Электроника
                  - subjectID: 1152
                    parentID: 858
                    subjectName: 3D-принтеры
                    parentName: Оргтехника
                error: false
                errorText: ''
                additionalErrors: null
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /content/v2/object/charcs/{subjectId}:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Subcategory Characteristics
      description: |
        Returns list of the subcategory characteristics by its ID

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 100 requests | 600 ms | 5 requests |

        Exceptions are the methods:
        <ul>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post">creating product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post">creating product cards with merge</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post">editing product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post">getting failed product cards with errors</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post">transfering product card to trash</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post">recovering product card from trash</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList">getting item recommendation list</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet">setting item recommendations</a></li>
        </ul>
        </div>
      tags:
        - Categories, Subcategories, and Characteristics
      parameters:
        - name: subjectId
          in: path
          required: true
          description: Subcategory ID
          schema:
            type: integer
            example: 105
        - name: locale
          in: query
          description: |
            Language for response of the `subjectName` and `name` fields:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese

            Not used in the sandbox
          schema:
            type: string
            example: en
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Data
                    items:
                      type: object
                      properties:
                        charcID:
                          type: integer
                          description: Characteristics ID
                        subjectName:
                          type: string
                          description: Subcategory name
                        subjectID:
                          type: integer
                          description: Subcategory ID
                        name:
                          type: string
                          description: Characteristic name
                        required:
                          type: boolean
                          description: Characteristic required
                        unitName:
                          type: string
                          description: Unit (sm, gr and others)
                        maxCount:
                          type: integer
                          description: |
                            The maximum number of values that can be assigned to a characteristic when [creating](./work-with-products#tag/listingItems) or [editing](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) listings.
                            <br>
                            Used only for characteristics with `"charcType":1` — array of strings.
                            <br>
                            For characteristics with `"charcType":4` — number, you can assign only one value.
                            <br><br>
                            For characteristics with `"maxCount":0`, the number of values is unlimited.
                        popular:
                          description: The characteristic is popular with users
                          type: boolean
                        charcType:
                          type: integer
                          description: |
                            Characteristic data type that should be used when [creating](./work-with-products#tag/listingItems) or [editing](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) listings:
                              -  `1` — array of strings
                              -  `4` — number
                              -  `0` — characteristic is not used
                        hasFilter:
                          type: boolean
                          description: |
                            Key characteristic. Is it an important characteristic for buyers:
                              - `true` — yes
                              - `false` — no
                        isVariable:
                          type: boolean
                          description: |
                            A sign of variable characteristic. The value marks out the characteristics by which the variants differ from each other:
                              - `true` — item variants differ by this characteristic
                              - `false` — item variants do not differ by this characteristic
                        existNamedField:
                          type: boolean
                          description: "How to transfer a characteristic in requests for [creating](./work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post),\_[creating with merge](./work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post), and\_[editing](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) listings:\n  - `true` — as a separate parameter in the request\n  - `false` — in the `characteristics` array\n"
                  error:
                    type: boolean
                    description: Error flag
                  errorText:
                    type: string
                    description: Error description
                  additionalErrors:
                    type: string
                    description: Additional errors
                    nullable: true
                example:
                  data:
                    - charcID: 54337
                      subjectName: Кроссовки
                      subjectID: 105
                      name: Размер
                      required: false
                      unitName: см
                      maxCount: 0
                      popular: false
                      charcType: 4
                      hasFilter: true
                      isVariable: true
                      existNamedField: true
                  error: false
                  errorText: ''
                  additionalErrors: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
        '429':
          $ref: '#/components/responses/429'
