  /content/v2/get/cards/trash:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Listings in Trash
      description: |
        Returns list of listings in trash.

        To get **more than 100** listings, use pagination.
          1. Make the first request: <br>
              <pre>
                {
                  "settings": {
                    "sort": {
                      "ascending": true
                    },
                    "cursor": {
                      "limit": 100
                    }
                  }
                }</pre>
             To get only listings that were transferred to the trash after data export, use ascending sorting: `"sort":{"ascending":true}`.
          2. Copy `"trashedAt":"***","nmID":***` from the `cursor` in the response and insert into the `cursor` of your next request.
          3. Make the next request.
          4. Repeat 2 and 3 until `total` value in the response is less than the `limit` value in the request. This will mean you got all listings.

        To get only listings that were transferred to the trash after the previous data export:
          1. Save `"trashedAt":"***","nmID":***` from the `cursor` of the previous data export. When data export, use ascending sorting: `"sort":{"ascending":true}`.
          2. Specify the `"cursor":{"trashedAt":"***","nmID":"***"}` saved fields in the first request. Keep using ascending sorting.
          3. Save the `"cursor":{"trashedAt":"***","nmID":"***"}` fields from the last response of the current data export.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 100 requests | 600 ms | 5 requests |

        Exceptions are the methods:
        <ul>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post">creating product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post">creating product cards with merge</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post">editing product cards</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post">getting failed product cards with errors</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post">transfering product card to trash</a></li>
            <li><a href="/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post">recovering product card from trash</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList">getting item recommendation list</a></li>
            <li><a href="/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet">setting item recommendations</a></li>
        </ul>
        </div>
      tags:
        - Listings
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            enum:
              - ru
              - en
              - zh
          description: |
            Language for response of the `name`, `value` and `object` fields:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese

            Not used in the sandbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
                  description: Settings
                  properties:
                    sort:
                      description: Sort by
                      type: object
                      properties:
                        ascending:
                          type: boolean
                          default: false
                          description: "Sorting by `trashedAt` field:\n  - `true` — ascending\n  - `false`\_— descending\n"
                    cursor:
                      description: Paginator
                      type: object
                      properties:
                        limit:
                          type: integer
                          maximum: 100
                          default: 10
                          description: Number of listings in response
                        trashedAt:
                          type: string
                          description: Date and time the listing was transferred to trash
                        nmID:
                          type: integer
                          description: WB item number for next listing page
                    filter:
                      description: Filters
                      type: object
                      properties:
                        textSearch:
                          type: string
                          description: Seller item number, Wildberries item number or SKU to search
            example:
              settings:
                sort:
                  ascending: false
                filter:
                  textSearch: '4603743187500888'
                cursor:
                  trashedAt: '2023-12-06T11:17:00.96577Z'
                  nmID: 370870300
                  limit: 11
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
