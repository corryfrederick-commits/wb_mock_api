components:
  schemas:
    BrandsResponse:
      type: object
      required:
        - brands
        - total
      properties:
        brands:
          type: array
          items:
            type: object
            required:
              - id
              - logoUrl
              - name
            properties:
              id:
                description: Brand ID
                example: 9007199254
                type: integer
              logoUrl:
                description: Brand logo URL
                type: string
              name:
                description: Brand name
                type: string
                example: Brand
        next:
          type: integer
          description: Pagination parameter. Specify this value in the request to get the next batch. If the field is missing, you received all the data
          example: 1212
        total:
          type: integer
          description: Total number of brands of the subcategory
          example: 344534
    BrandsResponseError:
      type: object
      required:
        - title
        - detail
        - origin
        - requestId
      properties:
        title:
          type: string
          description: Error title
        detail:
          type: string
          description: Error details
        origin:
          type: string
          description: WB internal service ID
        requestId:
          type: string
          description: Unique request ID
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
                description: Error text
              location:
                type: string
                description: Parameter where the error occurred
              value:
                description: Value of the parameter where the error occurred
    StoreContactRequestBody:
      type: object
      description: Seller warehouse contacts
      properties:
        contacts:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              comment:
                type: string
                nullable: false
                description: Comment
                example: Иванов Иван Иванович. Звонить с 10 до 21 часа.
                maxLength: 1000
              phone:
                type: string
                nullable: false
                description: |
                  Phone number.<br>Supported country codes:
                    - `+7` — Russia, Kazakhstan
                    - `+374` — Armenia
                    - `+375` — Belarus
                    - `+996` — Kyrgyzstan
                example: '+79998887766'
    responseItemList:
      type: object
      properties:
        data:
          type: object
          nullable: true
          example: null
          description: Response data
        error:
          description: Error flag
          type: boolean
        errorText:
          description: Error description
          type: string
        additionalErrors:
          description: Any additional errors
          oneOf:
            - type: object
              nullable: true
              properties:
                string:
                  type: string
              additionalProperties: false
            - type: string
              nullable: true
            - type: object
              properties:
                error:
                  type: string
