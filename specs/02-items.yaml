  /content/v2/cards/error/list:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Failed Listings with Errors
      description: |
        Returns the list of listings ([drafts](https://seller.wildberries.ru/new-goods/error-cards)) and the list of errors encountered during listing creation or editing.
        <br><br>
        The data is returned in batches. One batch contains:
          - all errors for one `variants` array in one request during listings [creation](/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post)
          - all errors in one request during listings [creation with merge](/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post) or [editing](/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post).
        <br><br>
        To get more than 100 batches, use pagination:

          1. Make first request: <br>
              <pre style="background-color: rgb(38 50 56 / 5%); color: #e53935">
                {
                  "cursor": {
                    "limit": 100
                  },
                  "order": {
                    "ascending": true
                  }
                }</pre>
          2. Copy `"updatedAt":"***","batchUUID":"***"` from the response `cursor` and paste into the request `cursor`.
          3. Repeat the request.
          4. Repeat 2 and 3, until you receive in the response `"next":false`. This will mean that you have received all the batches.

        <div class="description_important">
          To delete listing from the errors list, repeat the request for creating or creating with merge and updating request with fixed errors
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 10 requests | 6 s | 5 requests |
        </div>
      tags:
        - Listings
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            example: en
          description: |
            Language of subcategory names:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/requestPublicViewerPublicErrorsTableListV2'
            example:
              cursor:
                limit: 31
                updatedAt: '2025-08-05T17:54:40+08:00'
                batchUUID: bca3744c-1c8b-4588-b345-62af3b2899ae
              order:
                ascending: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsePublicViewerPublicErrorsTableListV2'
              example:
                data:
                  items:
                    - batchUUID: b15fecaf-57fd-4b63-ab6f-18d630b8793e
                      subjects:
                        wb15j2kjk9:
                          id: 8827
                          name: Автомобили с пробегом
                        wb3g6advyh:
                          id: 8827
                          name: Автомобили с пробегом
                        wb3g7xx8g9:
                          id: 8827
                          name: Автомобили с пробегом
                        wb4uphjn61:
                          id: 8827
                          name: Автомобили с пробегом
                        wb64nayozt:
                          id: 8827
                          name: Автомобили с пробегом
                      brands: {}
                      vendorCodes:
                        - wb64nayozt
                        - wb15j2kjk9
                        - wb3g7xx8g9
                        - wb3g6advyh
                        - wb4uphjn61
                      errors:
                        wb15j2kjk9:
                          - 'Поле Наименование не должно содержать запрещенные символы: 😈 😊 🤨'
                        wb3g6advyh:
                          - 'Поле Наименование не должно содержать запрещенные символы: 😊 🤨 😈'
                        wb3g7xx8g9:
                          - 'Поле Наименование не должно содержать запрещенные символы: 🤯'
                        wb4uphjn61:
                          - 'Поле Наименование не должно содержать запрещенные символы: 😊 🤨 😈'
