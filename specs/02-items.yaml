  /content/v3/media/file:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: false
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Upload Media File
      description: "Uploads and adds one media file for the listing.\n\nRequirements for images:\n\n  * maximum images for\_each listing \_— 30,\n  * minimal resolution – 700\_×\_900 pixels,\n  * maximum size\_— 32\_МB,\n  * minimal quality\_— 65%,\n  * formats\_— JPG, PNG, BMP, GIF (static), WebP.\n\nRequirements for video:\n\n  * maximum one video for\_each listing\n  * maximum size\_— 50\_MB\n  * formats\_— MOV, MP4\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Introduction/Rate-Limits\">Request limit</a> per one seller account for all methods in the <strong>Content</strong> category:\n\n| Period | Limit | Interval | Burst |\n| --- | --- | --- | --- |\n| 1 min | 100 requests | 600 ms | 5 requests |\n\nExceptions are the methods:\n<ul>\n    <li><a href=\"/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload/post\">creating product cards</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Creating-Product-Cards/paths/~1content~1v2~1cards~1upload~1add/post\">creating product cards with merge</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1update/post\">editing product cards</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1error~1list/post\">getting failed product cards with errors</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1delete~1trash/post\">transfering product card to trash</a></li>\n    <li><a href=\"/openapi/work-with-products#tag/Product-Cards/paths/~1content~1v2~1cards~1recover/post\">recovering product card from trash</a></li>\n    <li><a href=\"/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsList\">getting item recommendation list</a></li>\n    <li><a href=\"/openapi/promotion#tag/Recommendations/operation/postV1RecommendationsSet\">setting item recommendations</a></li>\n</ul>\n</div>\n"
      tags:
        - Media Files
      parameters:
        - name: X-Nm-Id
          in: header
          description: Wildberries item number
          schema:
            type: string
            example: '213864079'
          required: true
        - name: X-Photo-Number
          in: header
          description: "Number of media file, starting from\_`1`. To add the video set `1`.\n\nTo add the image to the uploaded ones, set file the number more then number of uploaded files.\n"
          schema:
            type: integer
            example: 2
          required: true
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                uploadfile:
                  type: string
                  format: binary
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                  error:
                    description: Error flag
                    type: boolean
                  errorText:
                    description: Error description
                    type: string
                  additionalErrors:
                    nullable: true
                    description: Additional errors
                    type: object
              example:
                data: {}
                error: false
                errorText: ''
                additionalErrors: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
            plain/text:
              example: Invalid 'boundary' for 'multipart/form-data' request
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaErrors'
        '429':
          $ref: '#/components/responses/429'
