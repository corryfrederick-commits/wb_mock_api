      tags:
        - Seller Warehouses Inventory
      summary: Update Inventory
      description: |
        Updates item inventory.

        <div class="description_important">
          The names of the query parameters are not validated. If invalid names are sent, the response will be successful(204), but the remaining amounts will not be updated.
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account for all <strong>inventory</strong> methods:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 300 requests | 200 ms | 20 requests |

        One request with <code>4XX</code> response codes is counted as 10 requests
        </div>
      parameters:
        - $ref: '#/components/parameters/Warehouse'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - stocks
              properties:
                stocks:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  description: Array of size IDs and amounts
                  items:
                    type: object
                    properties:
                      chrtId:
                        type: integer
                        description: Size ID
                        example: 12345678
                      amount:
                        type: integer
                        maximum: 100000
                        description: Stock
                        example: 10
      responses:
        '204':
          description: Updated
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                IncorrectRequestBody:
                  $ref: '#/components/examples/IncorrectRequestBody'
                IncorrectRequest:
                  $ref: '#/components/examples/IncorrectRequest'
                IncorrectParameter:
                  $ref: '#/components/examples/IncorrectParameter'
                SKUUploadDisabled:
                  $ref: '#/components/examples/SKUUploadDisabled'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          description: Inventory update is blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBlocked'
              examples:
                StatusNotAcceptable:
                  $ref: '#/components/examples/StatusNotAcceptable'
                WarehouseStocksUpdateBlock:
                  $ref: '#/components/examples/WarehouseStocksUpdateBlock'
        '409':
          description: Error updating inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StocksWarehouseError'
