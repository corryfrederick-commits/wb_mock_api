  /content/v2/cards/delete/trash:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: false
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Transfer Listing to Trash
      description: |
        Transfers the listing to the trash. In doing so, the listing would not be deleted.

        <div class="description_important">
          When transferring listings to the trash, this listing is removed from the listing, meaning it is assigned a new <code>imtID</code> — merged listing ID
        </div>

        After 30 days in the trash the listing would be deleted automatically. The trash is cleared every night according to Moscow time.<br>
        The listing can be deleted at any time in [personal account](https://seller.wildberries.ru/new-goods/basket-cards).
        <br><br>
        A listing will remain for sale as long as there is any inventory left, even if moved to the trash. To completely remove the listing from sale, set its inventory to zero.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 3 requests | 20 s | 5 requests |
        </div>
      tags:
        - Listings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nmIDs:
                  description: Wildberries item numbers
                  minimum: 1
                  maximum: 1000
                  type: array
                  items:
                    type: integer
            example:
              nmIDs:
                - 123456789
                - 987654321
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                  error:
                    description: Error flag
                    type: boolean
                  errorText:
                    description: Error description
                    type: string
                  additionalErrors:
                    nullable: true
