          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    post:
      x-readonly-method: false
      x-category: content
      tags:
        - Listing Items
      summary: List Items
      description: "Lists items. You can specify item description and characteristics.<br>\n\nHow to list an item:\n\n  1. Get [parent categories list](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1parent~1all/get)\n  2. Get [the category and get all subcategories](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1all/get)\n  3. Choose [the subcategory and get all available characteristics](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get). For `Color`, `Gender`, `Country of origin`, `Season`, `VAT rate`, `HS-code` characteristics use values from [category](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics).\n  4. Send the request. If the response is Success (`200`) but the item was not listed, check errors using [failed listing with errors](/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1error~1list/post) method.\n\nThe dimensions of the items can only be specified in `centimeters`, and the weight of packed items must be specified in `kilograms`.<br>\n\nWith one request you can list maximum 100\_individual items or 100 groups of merged listings, 30\_listings (`nmID`) in\_each. Maximum request size is 10 Mb.<br>\n\nItems are listed asynchronously. The process of synchronizing a new listing with services may take up to 30 minutes. During this time, you can't add inventory to warehouses and set prices.\n\n<div class=\"description_important\">\n  If there were errors during queue processing, the listing is considered invalid\n</div>\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Introduction/Rate-Limits\">Request limit</a> per one seller account:\n\n| Period | Limit | Interval | Burst |\n| --- | --- | --- | --- |\n| 1 min | 10 requests | 6 s | 5 requests |\n</div>\n"
      requestBody:
        content:
          application/json:
            schema:
              description: Отдельные карточки товаров или группы объединённых карточек товаров
              type: array
              items:
                type: object
                required:
                  - subjectID
                  - variants
                minimum: 1
                maximum: 100
                properties:
                  subjectID:
                    type: integer
                    description: Subcategory ID
                  variants:
                    description: Merged listings.<br>To list individual item, pass only one object.
                    type: array
                    items:
                      type: object
                      required:
                        - vendorCode
                      minimum: 1
                      maximum: 30
                      properties:
                        brand:
                          type: string
                          description: Brand
                        title:
                          type: string
                          description: Item title
                          maxLength: 60
                        description:
                          type: string
                          description: |
                            Item description.<br>
                            The maximum number of characters depends on the item category<br>
                            Standard — 2000, minimum — 1000, maximum — 5000<br>
                            More details about **rules for filling out the listing** in [Instructions](https://seller.wildberries.ru/instructions/ru/ru/material/how-to-create-card) category of sellers portal
                        vendorCode:
                          type: string
                          description: Seller item number
                          maxLength: 72
                        kizMarked:
                          type: boolean
                          default: false
                          description: |
                            Confirmation that required labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is specified:
                              - `true` — the seller confirms that required labeling code is applied to the item.
                              - `false` — the seller does not confirm that required labeling code is applied to the item. Pass `true` in the request to confirm that the item has required labeling code. The item will not pass moderation if there is no confirmation from the seller that required labeling code is applied to the item.

                            To check if labeling code [Chestny ZNAK](https://chestnyznak.ru/en) is required, use the [Listings](./work-with-products#tag/listings/paths/~1content~1v2~1get~1cards~1list/post) method, the response field `needKiz`
                        wholesale:
                          type: object
                          description: Wholesale
                          properties:
                            enabled:
                              type: boolean
                              description: Is the listing intended for wholesale
                            quantum:
                              type: number
                              format: uint64
                              description: Number of item units per package
                        dimensions:
                          description: |
                            Dimensions and weight of the item **with packaging**. <br>Specify in `centimeters` and `kilograms` for any item.<br>
                            If the data is not specified, zero values ​​for length, width, height and weight will be automatically generated. <br>
                            The process of synchronizing new data with service may take up to 30 minutes
                          type: object
                          properties:
                            length:
                              type: integer
                              description: Length, cm
                            width:
                              type: integer
                              description: Width, cm
                            height:
                              type: integer
                              description: Height, cm
                            weightBrutto:
                              type: number
                              description: Weight, kg<br>Number of decimal places <=3
                        sizes:
                          type: array
                          description: |
                            Item sizes.<br>
                            If the item has sizes but you send empty parameter, it is generated automatically with values: `techSize` = "A", `wbSize` = "1" and some random SKU
                          items:
                            type: object
                            properties:
                              techSize:
                                type: string
                                description: Item size (for example, L or 45)
                              wbSize:
                                type: string
                                description: Russian size
                              price:
                                type: integer
                                description: Price, ₽
                              skus:
                                type: array
                                items:
                                  type: string
                                description: |
                                  Array of SKUs for the size. <br>
                                  If not specified, SKU is generated automatically. <br>
                                  Allows linking multiple SKUs to one size, for example, for different batches of the item
                        characteristics:
                          type: array
                          description: |
                            Item characteristics.
                            <br>
                            Use the [Subcategory characteristics](./work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method to get characteristics of the item
                          items:
                            type: object
                            required:
                              - id
                              - value
                            properties:
                              id:
                                type: integer
                                description: Characteristic ID
                              value:
                                description: |
                                  Characteristic values.
                                  <br>
                                  Data type — array of strings or number — depends on the characteristic data type. For more details see the description of the `charcType` field in the [Subcategory characteristics](./work-with-products#tag/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method.
                                  <br>
                                  The allowed number of values is specified in the `maxCount` field of the [Subcategory characteristics](./work-with-products#tag/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) method
            examples:
              creatingOneListing:
                $ref: '#/components/examples/creatingOneListing'
              creatingMergedListings:
                $ref: '#/components/examples/creatingMergedListings'
              creatingGroupOfIndividualListings:
                $ref: '#/components/examples/creatingGroupOfIndividualListings'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseItemList'
              example:
                data: null
                error: false
                errorText: ''
                additionalErrors: {}
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
              examples:
                InvalidRequestFormatContent:
                  $ref: '#/components/examples/InvalidRequestFormatContent'
                ItemListedWithoutVendorCode:
                  $ref: '#/components/examples/ItemListedWithoutVendorCode'
                ListingsVendorCodeUsedInOtherListings:
                  $ref: '#/components/examples/ListingsVendorCodeUsedInOtherListings'
                ThisCategoryDoesNotExist:
                  $ref: '#/components/examples/ThisCategoryDoesNotExist'
                MissingRequiredCharacteristics:
                  $ref: '#/components/examples/MissingRequiredCharacteristics'
                NonUniqueCharacteristicsInOneGroupCreate:
                  $ref: '#/components/examples/NonUniqueCharacteristicsInOneGroupCreate'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '413':
          description: The request body size exceeds the given limit
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: Error title
                  detail:
                    type: string
                    description: Error details
                  code:
                    type: string
                    description: Internal error code
                  requestId:
                    type: string
                    description: Unique request ID
                  origin:
                    type: string
                    description: WB internal service ID
                  status:
                    type: number
                    description: HTTP status code
                  statusText:
                    type: string
                    description: Text of the HTTP status code
              example:
                title: request body too long
                detail: https://openapi.wildberries.ru/content/api/ru/
                code: 71d3de1b-001e-488f-bbf5-55c31254fbeb
                requestId: MN8usr6RfrzWHZfucSvNgb
                origin: s2s-api-auth-content
                status: 413
                statusText: Request Entity Too Large
        '429':
          $ref: '#/components/responses/429'
  /content/v2/cards/upload/add:
