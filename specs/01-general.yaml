  /api/v1/users/access:
    servers:
      - url: https://user-management-api.wildberries.ru
    put:
      x-readonly-method: false
      x-category: usermanagement
      x-token-types:
        - personal
      tags:
        - Seller User Management
      security:
        - HeaderApiKey: []
      summary: Update User's Access Permissions
      description: |
        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Personal</strong> token
        </div>

        The method changes the access rights for one or more users.<br>
        <br>
        Only the data passed in the request parameters will be updated. The other fields will remain unchanged.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 1 request | 1 s | 5 requests |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateUserAccessRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/user:
    servers:
      - url: https://user-management-api.wildberries.ru
    delete:
      x-readonly-method: false
      x-category: usermanagement
      x-token-types:
        - personal
      tags:
        - Seller User Management
      security:
        - HeaderApiKey: []
      summary: Delete User
      description: |
        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Personal</strong> token
        </div>

        The method removes a user from [the seller users list](/openapi/api-information#tag/Seller-User-Management/paths/~1api~1v1~1users/get). This user will no longer have access to the seller account.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 1 request | 1 s | 10 requests |
        </div>
      parameters:
        - in: query
          name: deletedUserID
          required: true
          schema:
            type: integer
            format: int64
          description: ID of the user whose access will be revoked
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
components:
  securitySchemes:
    HeaderApiKey:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    Access:
      type: array
      description: Access settings for seller account sections
      items:
        type: object
        required:
          - code
          - disabled
        properties:
          code:
            type: string
            description: |
              The code for the seller account section the user will get access to:
              * `balance` — View balance and withdraw funds
              * `brands` — Brands management
              * `changeJam` — Access to **Jam** subscription: **A/B tests**, photo tags, video autostarts, listing comparisons
              * `discountPrice` — Change item prices, manage discounts and promotions
              * `finance` — Financial analytics. Balance statistics, financial reports, payment history
              * `showcase` — Showcase management
              * `suppliersDocuments` — View and download documents related to platform operations
              * `supply` — Create and manage FBW supplies
              * `questions` — View and respond to customer questions
              * `pinFeedbacks` — Ability to pin and unpin reviews
              * `pointsForReviews` — Points for reviews
              * `feedbacks` — View and respond to customer reviews
              * `oldAnalyticsReports` — Reports
              * `marketplace` — Seller Warehouse
              * `brandsFlow` — My brands
              * `copyrightComplaints` — Copyright Claims
              * `pretrialClaims` — Out-of-Court Claims
              * `sellersChat` — Chat with Users
              * `brandzone` — Edit Brand Zone
              * `brandzoneSubscribe` — Manage Brand Zone Subscription
            enum:
              - balance
              - brands
              - changeJam
              - discountPrice
              - finance
              - showcase
              - suppliersDocuments
              - supply
              - questions
              - pinFeedbacks
              - pointsForReviews
              - feedbacks
              - oldAnalyticsReports
              - marketplace
              - brandsFlow
              - copyrightComplaints
              - pretrialClaims
              - sellersChat
              - brandzone
              - brandzoneSubscribe
          disabled:
            type: boolean
            description: |
              * `true` — access to the section is disabled
              * `false` — access to the section is enabled
      example:
        - code: balance
          disabled: false
        - code: pointsForReviews
          disabled: false
        - code: brands
          disabled: true
        - code: finance
          disabled: true
        - code: supply
          disabled: true
    getUsersResponse:
      type: object
      required:
        - users
        - total
        - countInResponse
      properties:
        total:
          type: integer
          description: The total number of active or invited users in the list
        countInResponse:
          type: integer
          description: The number of active or invited users on the current page
        users:
          type: array
          description: User information
          items:
            type: object
            required:
              - id
              - role
              - position
              - phone
              - email
              - isOwner
              - firstName
              - secondName
              - patronymic
              - goodsReturn
              - isInvitee
              - inviteeInfo
              - access
            properties:
              id:
                type: integer
                description: User ID
              role:
                type: string
                description: |
                  User role:
                  * `user` — user who have activated access
                  * ` ` (empty string) — user who have not yet activated access
                enum:
                  - user
                  - ''
              position:
                type: string
                description: User's position
              phone:
                type: string
                description: User's phone number
              email:
                type: string
                description: User's email
              isOwner:
                type: boolean
                description: Is the user the seller account's owner
              firstName:
                type: string
                description: User's first name
              secondName:
                type: string
                description: User's last name
              patronymic:
                type: string
                description: User's patronymic
              goodsReturn:
                type: boolean
                description: Can user approve item returns
              isInvitee:
                type: boolean
                description: Is the user invited
              inviteeInfo:
                type: object
                nullable: true
                description: Invitation information, if the user is invited
                properties:
                  phoneNumber:
                    type: string
                    description: Invited user's phone number
                  position:
                    type: string
                    description: Invited user's position
                  inviteUuid:
                    type: string
                    description: Invitation ID
                    format: UUID
                  expiredAt:
                    type: string
                    format: date-time
                    description: Invitation expiration date and time
                  isActive:
                    type: boolean
                    description: |
                      - `true` — the invitation is active
                      - `false` — the invitation is inactive
              access:
                $ref: '#/components/schemas/Access'
    createInviteRequest:
      type: object
      required:
        - invite
      properties:
        access:
          $ref: '#/components/schemas/Access'
        invite:
          type: object
          required:
            - phoneNumber
          properties:
            phoneNumber:
              type: string
              description: |
                User's phone number for the invitation.
                <details><summary><strong>Phone numbers from the following countries are supported:</strong></summary>• Armenia<br>• Azerbaijan<br>• Barbados<br>• Belarus<br>• Brazil<br>• China<br>• Czech Republic<br>• Georgia<br>• Hong Kong<br>• Italy<br>• Kazakhstan<br>• Kyrgyzstan<br>• Macau<br>• Russia<br>• Serbia<br>• Sweden<br>• Tajikistan<br>• Turkey<br>• UAE<br>• Uzbekistan</details>
            position:
              type: string
              maxLength: 150
              description: User's position
      example:
        access:
          - code: balance
            disabled: false
          - code: pointsForReviews
            disabled: false
          - code: brands
            disabled: true
          - code: finance
            disabled: true
          - code: supply
            disabled: true
        invite:
          phoneNumber: '79999999999'
          position: Менеджер
    createInviteResponse:
      type: object
      required:
        - inviteID
        - expiredAt
        - isSuccess
        - inviteUrl
      description: Invitation details
      properties:
        inviteID:
          type: string
          format: uuid
          description: Invitation ID
        expiredAt:
          type: string
          format: date-time
          description: Date and time of expiration of the invitation
        isSuccess:
          type: boolean
          description: |
            - `true` — the invitation was created successfully
            - `false` — retry the request
        inviteUrl:
          type: string
          description: The invitation URL that the user should follow
      example:
        inviteID: 741b8aa6-08ac-4782-8a9d-d931bcbbf608
        expiredAt: '2025-10-06T10:56:04.335060746Z'
        isSuccess: true
        inviteUrl: https://seller.wildberries.ru/supplier-settings/supplier-card?inviteId=e5a813c7-65e0-4599-a550-a6b3d85661ed
    updateUserAccessRequest:
      type: object
      required:
        - usersAccesses
      properties:
        usersAccesses:
          type: array
          description: Access settings for user
          items:
            $ref: '#/components/schemas/UserAccess'
      example:
        usersAccesses:
          - userId: 42334965
            access:
              - code: balance
                disabled: false
              - code: finance
                disabled: true
              - code: feedbacks
                disabled: false
          - userId: 52334965
            access:
              - code: balance
                disabled: true
              - code: changeJam
                disabled: false
              - code: showcase
                disabled: false
    UserAccess:
      type: object
      properties:
        userId:
          type: integer
          description: User ID
        access:
          $ref: '#/components/schemas/Access'
    errorResponse:
      type: object
      required:
        - title
        - detail
        - requestId
        - origin
        - status
      properties:
        title:
          type: string
          description: Error title
        detail:
          type: string
          description: Error details
        requestId:
          type: string
          description: Request ID
        origin:
          type: string
          description: Internal service name
        status:
          type: number
          description: HTTP status code
      example:
        title: Bad Request
        status: 400
        detail: 'bad request cause: user is not in current supplier'
        requestId: c479c04d0b576a9ba0b20fdf235004c2
        origin: public-acl
    SupplierRatingModel:
      type: object
      properties:
        feedbackCount:
          description: Feedbacks number
          type: integer
          example: 12355
        valuation:
          description: Seller rating
          type: number
          format: float
          example: 4.55
    SubscriptionsJamInfo:
      type: object
      description: Jam subscription information
      required:
        - state
        - activationSource
        - level
        - since
        - till
      properties:
        state:
          type: string
          example: active
          enum:
            - active
            - inactive
          description: |
            Subscription state:
              - `active` — active
              - `inactive` — expired or canceled
        activationSource:
          type: string
          enum:
            - constructor
            - jam
          example: jam
          description: |
            Subscription activation source:
              - `constructor` — purchased via the **Plan Builder** section
              - `jam` — purchased via the **Jam Subscription** section
        level:
          type: string
          enum:
            - standard
            - advanced
            - premium
          example: premium
          description: |
            Subscription level:
              - `standard`
              - `advanced`
              - `premium`
        since:
          type: string
          format: date-time
          example: '2026-03-16T08:38:08.056406Z'
          description: The date and time when the subscription was first activated. Does not change upon renewal or reactivation
        till:
          type: string
          format: date-time
          example: '2026-04-25T14:44:28.393587Z'
          description: Subscription end date and time
    PlanBuilderOptionsInfo:
      type: object
      required:
        - activeOptionCount
        - activePackageCount
        - totalCommissionRate
        - packages
        - options
      properties:
        activeOptionCount:
          type: number
          format: int
          example: 5
          description: Number of active options not included in packages
        activePackageCount:
          type: number
          format: int
          example: 2
          description: Number of active option packages
        totalCommissionRate:
          type: number
          format: float
          example: 4.6
          description: Final commission for activated options and packages, % of turnover
        packages:
          type: array
          items:
            $ref: '#/components/schemas/PlanBuilderPackage'
          description: Activated option packages
        options:
          type: array
          items:
            $ref: '#/components/schemas/PlanBuilderOption'
          description: Activated options
    PlanBuilderPackage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 79861ed4-ccfd-4998-96a9-c90f8bf98bb9
          description: Package ID
        slug:
          type: string
          example: superSeller
          description: Package code
        name:
          type: string
          example: Суперпродавец
          description: Package name in the language specified in the `locale` parameter
        status:
          type: string
          example: active
          enum:
            - active
            - pendingActivation
            - pendingDeactivation
          description: |
            Package status:
              - `active` — active
              - `pendingActivation` — activated, will start working at 00:00 the next day
              - `pendingDeactivation` — deactivated, will stop working at 00:00 the next day
        activatedAt:
          example: '2006-01-02T15:04:05.999+03:00'
          description: Package activation date
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          example: '2006-01-02T15:04:05.999+03:00'
          description: End date of the minimum duration period for the package. The option package cannot be deactivated before this date
        commissionRate:
          type: number
          format: float
          example: 2.5
          description: Comission for the package, % of turnover
        periodDuration:
          type: number
          format: int
          example: 90
          description: Minimum duration of the package
        options:
          type: array
          items:
            $ref: '#/components/schemas/PlanBuilderOptionShort'
          description: Options included in the package
    PlanBuilderOption:
      type: object
      properties:
        id:
          type: string
          example: 4f134ae7-f768-481e-bac1-bf75d2fdc6f7
          description: Option ID
        slug:
          type: string
          example: pinReview
          description: Option code
        name:
          type: string
          example: Закрепление отзывов и видео из Wibes
          description: Option name in the language specified in the `locale` parameter
        status:
          type: string
          example: active
          enum:
            - active
            - pendingActivation
            - pendingDeactivation
          description: |
            Option status:
              - `active` — active
              - `pendingActivation` — activated, will start working at 00:00 the next day
              - `pendingDeactivation` — deactivated, will stop working at 00:00 the next day
        activatedAt:
          example: '2006-01-02T15:04:05.999+03:00'
          description: Option activation date
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          example: '2006-01-02T15:04:05.999+03:00'
          description: End date of the minimum duration period for the option. The option cannot be deactivated before this date
        commissionRate:
          example: 2.1
          description: Cost of activating the option, % of turnover. Returned if the response does not contain the `promotion` object
          type: number
          format: float
        periodDuration:
          type: number
          format: int
          example: 90
          description: Minimum duration of the option
        promotion:
          description: Promotion via the option is activated. Not returned if the option is activated without a promotion or if the promotion period expired
          $ref: '#/components/schemas/PlanBuilderPromotion'
          type: object
    PlanBuilderOptionShort:
      type: object
      properties:
        id:
          type: string
          example: 4f134ae7-f768-481e-bac1-bf75d2fdc6f7
          description: Option ID
        slug:
          type: string
          example: pinReview
          description: Option code
        name:
          type: string
          example: Закрепление отзывов и видео
          description: Option name in the language specified in the `locale` parameter
    PlanBuilderPromotion:
      type: object
      properties:
        commissionRate:
          type: number
          format: float
          example: 0.3
          description: Cost of activating the option through a promotion, % of turnover
        expiresAt:
          type: string
          format: date-time
          example: '2006-01-02T15:04:05.999+03:00'
          description: End date of the promotional price
    PlanBuilderErrors:
      type: object
      properties:
        title:
          type: string
          description: Error title
        detail:
          type: string
          description: Error details
        code:
          type: string
          description: Internal error code
        requestId:
          type: string
          description: Unique request ID
        origin:
          type: string
          description: WB internal service ID
        status:
          type: number
          description: HTTP status code
        errors:
          type: array
          description: Request errors with specified parameters and error details
  examples:
    PlanBuilderSuccess:
      value:
        activeOptionCount: 2
        activePackageCount: 1
        totalCommissionRate: 2.3
        packages:
          - slug: super-seller
            name: Суперпродавец
            status: active
            periodDuration: 90
            commissionRate: 0.8
            activatedAt: '2026-03-15T00:00:00+03:00'
            expiresAt: '2026-06-15T00:00:00+03:00'
            options:
              - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                slug: review-pin
                name: Закрепление отзыва
              - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                slug: premium-seller-status
                name: Статус Премиум-продавца
        options:
          - id: c3d4e5f6-a7b8-9012-cdef-123456789012
            slug: daily-withdrawal
            name: Запрос вывода денег в любой день
            status: active
            periodDuration: 90
            commissionRate: 1
            activatedAt: '2026-03-15T00:00:00+03:00'
            expiresAt: '2026-05-20T00:00:00+03:00'
          - id: d4e5f6a7-b8c9-0123-defa-234567890123
            slug: priority-support
            name: Приоритетная поддержка
            status: pendingDeactivation
            periodDuration: 30
            activatedAt: '2026-03-15T00:00:00+03:00'
            expiresAt: '2026-04-10T00:00:00+03:00'
            promotion:
              commissionRate: 0.3
              expiresAt: '2026-04-30T00:00:00+03:00'
    PlanBuilder400:
      value:
        title: Validation failed
        detail: 'Invalid locale value ''fr''. Allowed values: ru, en'
        status: 400
        origin: options-service
        code: INVALID_LOCALE
        requestId: abc123-def456
        errors:
          - field: locale
            message: 'Must be one of: ru, en'
    PlanBuilder404:
      value:
        title: Options not available
        detail: Options are not available for this supplier
        status: 404
        origin: options-service
        code: OPTIONS_NOT_AVAILABLE
  responses:
    '401':
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details
              code:
                type: string
                description: Internal error code
              requestId:
                type: string
                description: Unique request ID
              origin:
                type: string
                description: WB internal service ID
              status:
                type: number
                description: HTTP status code
              statusText:
                type: string
                description: Text of the HTTP status code
              timestamp:
                type: string
                format: date-time
                description: Request date and time
          example:
            title: unauthorized
            detail: 'token problem; token is malformed: could not base64 decode signature: illegal base64 data at input byte 84'
            code: 07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75
            requestId: 7b80742415072fe8b6b7f7761f1d1211
            origin: s2s-api-auth-catalog
            status: 401
            statusText: Unauthorized
            timestamp: '2024-09-30T06:52:38Z'
    '402':
      description: Payment required
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details. The error is only returned to services from the [Solutions for business Catalog](https://dev.wildberries.ru/business-solutions)
          example:
            title: payment required
            detail: wb solution for business has insufficient funds on its balance. please top up the balance in the company's personal account https://dev.wildberries.ru/company
    '429':
      description: Too many requests
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details
              code:
                type: string
                description: Internal error code
              requestId:
                type: string
                description: Unique request ID
              origin:
                type: string
                description: WB internal service ID
              status:
                type: number
                description: HTTP status code
              statusText:
                type: string
                description: Text of the HTTP status code
              timestamp:
                type: string
                format: date-time
                description: Request date and time
