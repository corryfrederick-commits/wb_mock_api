  /api/common/v1/subscriptions:
    servers:
      - url: https://common-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: commonapi
      operationId: getCommonV1Subscriptions
      x-token-types:
        - service
      tags:
        - Seller Information
      security:
        - HeaderApiKey: []
      summary: Get Jam Subscription Information
      description: |
        <div class="description_auth">
          You can get Jam subscription information with a token of any <a href="/openapi/api-information#tag/Authorization/Token-categories">category</a>.
        </div>


        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Service</strong> token
        </div>

        The method returns [Jam](https://seller.wildberries.ru/monetization/jam) subscription information:
          - If seller has never activated the Jam subscription, an empty `200` response is returned.
          - If seller activated the subscription and never canceled it, the following is returned:
            - subscription activation date `since`
            - end date of the current paid period `till`
          - If the subscription expired or was canceled but seller reactivated it, the following is returned:
            - date of the first subscription activation `since`
            - end date of the current paid period `till`
          - If the subscription is inactive, the following is returned:
            - date of the first subscription activation `since`
            - end date of the last paid period `till`

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 10 requests |
        </div>
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionsJamInfo'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/common/v1/tariff-constructor/options:
    servers:
      - url: https://common-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: commonapi
      operationId: getCommonV1TariffConstructorOptions
      x-token-types:
        - service
      tags:
        - Seller Information
      security:
        - HeaderApiKey: []
      summary: Get Information about Plan Builder Options
      description: |
        <div class="description_auth">
          You can get information about Plan Builder options with a token of any <a href="/openapi/api-information#tag/Authorization/Token-categories">category</a>.
        </div>

        The method returns information about all options and option packages that the seller activated in the [Plan Builder](https://seller.wildberries.ru/tariff-constructor).<br><br>

        Options included in activated packages are returned in the `packages` array. Options activated outside of packages are returned in the `options` array.


        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Service</strong> token
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 10 requests |
        </div>
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            default: ru
            example: ru
            enum:
              - ru
              - en
          description: |
            Language of the response fields:
              - `ru` — Russian
              - `en` — English
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanBuilderOptionsInfo'
              examples:
                PlanBuilderSuccess:
                  $ref: '#/components/examples/PlanBuilderSuccess'
        '400':
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PlanBuilderErrors'
              examples:
                PlanBuilder400:
                  $ref: '#/components/examples/PlanBuilder400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PlanBuilderErrors'
              examples:
                PlanBuilder404:
                  $ref: '#/components/examples/PlanBuilder404'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/invite:
    servers:
      - url: https://user-management-api.wildberries.ru
    post:
      x-readonly-method: false
      x-category: usermanagement
      x-token-types:
        - personal
      tags:
        - Seller User Management
      security:
        - HeaderApiKey: []
      summary: Create an Invitation for a New User
      description: |
        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Personal</strong> token
        </div>

        The method creates an invitation for a new user with access settings to the seller account sections.<br>
        How access rights are assigned:
        - If `access` is empty (`[]`) or not provided — by default, all access is granted, except for access to the showcase (`showcase`) and **Jam** (`changeJam`)
        - If `access` specifies some of the account sections, then in addition to the access rights specified in the request, all default access rights are also granted
        - If `access` lists all possible sections, access rights will be granted according to the request, without the default access rights
        - If the same section (`code`) is specified twice in `access`:
          - with different `disabled` values (`true` and `false`), access will not be granted
          - with identical values of `"disabled": true`, access will not be granted
          - with identical values of `"disabled": false`, access will be granted

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 1 request | 1 s | 5 requests |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createInviteRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createInviteResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/users:
    servers:
      - url: https://user-management-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: usermanagement
      x-token-types:
        - personal
      tags:
        - Seller User Management
      security:
        - HeaderApiKey: []
      summary: Get a List of Seller Active or Invited Users
      description: |
        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Personal</strong> token
        </div>

        The method returns a list of seller account active or invited users.<br><br>

        Specify the value of the `isInviteOnly` parameter to select the list:
          - `isInviteOnly=true` — invited users list who have not yet activated access
          - `isInviteOnly=false` or is not provided — active users list

        For each user, you can get:
          - user's role
          - accessible sections
          - invitation status

        The list of invited users in the response is always sorted by creation date: from newest to oldest.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 1 request | 1 s | 5 requests |
        </div>
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            format: int64
            maximum: 100
            default: 100
          description: The number of active or invited users in the response
        - in: query
          name: offset
          schema:
            type: integer
            format: int64
            default: 0
          description: |
            How many results to skip. For example, for the value 10, the response will start with the 11 element
        - in: query
          name: isInviteOnly
          schema:
            type: boolean
            default: false
          description: |
            - `true` — the list of invited users who have not yet activated access
            - `false` or not provided — the list of active users of the seller account
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getUsersResponse'
              examples:
                invitesOnly:
                  summary: isInviteOnly=true
                  description: List of invited users
                  value:
                    total: 2
                    countInResponse: 2
