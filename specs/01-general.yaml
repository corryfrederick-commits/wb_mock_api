          To access the method, use a <a href="/openapi/api-information#tag/Authorization/How-to-create-a-personal-access-base-or-test-token">token</a> for the <strong>Feedbacks and Questions</strong> category
        </div>


        <div class="description_token">
            Method is <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">available</a> by
                <strong>Service</strong> token
        </div>

        The method returns the seller user rating and feedbacks count.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
